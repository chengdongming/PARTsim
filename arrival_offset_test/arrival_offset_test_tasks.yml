# =============================================
# arrival_offset 和抢占式调度测试
# =============================================

taskset:
  # task_high: 最高优先级，周期500ms，立即到达
  - name: task_high
    iat: 500
    runtime: 150
    deadline: 500
    params: "period=500,wcet=150,arrival_offset=0,workload=bzip2"
    code:
      - fixed(150, bzip2)

  # task_mid: 中优先级，周期1000ms，延迟200ms到达
  - name: task_mid
    iat: 1000
    runtime: 250
    deadline: 1000
    params: "period=1000,wcet=250,arrival_offset=200,workload=bzip2"
    code:
      - fixed(250, bzip2)

  # task_low: 低优先级，周期1500ms，延迟100ms到达
  - name: task_low
    iat: 1500
    runtime: 200
    deadline: 1500
    params: "period=1500,wcet=200,arrival_offset=100,workload=hash"
    code:
      - fixed(200, hash)

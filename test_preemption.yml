# 抢占测试配置
# 测试场景：低优先级任务先执行，高优先级任务到达后抢占

system:
  energy:
    initial: 0.010      # 初始能量 0.01J（足够两个任务运行）
    max: 0.020          # 最大能量容量
    pv_efficiency: 0.20 # PV效率
    pv_area: 0.01       # PV面积 10cm²
    solar_data: "data/solar/night_24h.txt"  # 夜间太阳能数据（无能量输入）

  simulation:
    duration: 20        # 模拟时长20ms

scheduler:
  type: "gpfp_tie"      # 使用TIE调度器
  tick_period: 1        # Tick周期1ms

cpus:
  - id: 0
    frequency: 1000     # 1GHz

tasks:
  # 低优先级任务（周期10ms，WCET 5ms）
  - name: "task_low_priority"
    type: "periodic"
    period: 10
    wcet: 5
    arrival: 0          # t=0到达
    deadline: 10
    workload: "fft"     # FFT工作负载
    energy_coefficient: 1.0

  # 高优先级任务（周期5ms，WCET 2ms）
  # 由于周期更短，RM优先级更高
  - name: "task_high_priority"
    type: "periodic"
    period: 5
    wcet: 2
    arrival: 1          # t=1ms到达
    deadline: 5
    workload: "fft"     # FFT工作负载
    energy_coefficient: 1.0

# 预期行为：
# t=0: task_low_priority 到达并开始执行
# t=1: task_high_priority 到达（高优先级）
# t=1: 抢占发生！task_low_priority 被挂起，task_high_priority 开始执行
# t=3: task_high_priority 完成
# t=3: task_low_priority 恢复执行
# t=5: task_high_priority 再次到达
# t=6: task_low_priority 完成（剩余4ms执行时间 + 1ms延迟）

# =============================================
# PARTSim 任务集模板 - 完整版
# =============================================
# 适用于所有调度器: gpfp_asap, gpfp_cascade, gpfp_epp
# 包含各种任务类��和指令示例
# =============================================

# ---------------------------------------------
# 任务集定义
# ---------------------------------------------
taskset:
  # ===========================================
  # 示例1: 简单固定执行时间任务（推荐用于EPP）
  # ===========================================
  - name: task_high
    iat: 500                    # 任务到达间隔 / 周期 (ms)
    runtime: 250                # WCET: 最坏执行时间 (ms)
    deadline: 500               # 绝对截止时间 (ms)
    params: "period=500,wcet=250,arrival_offset=0,workload=bzip2"
    code:
      - fixed(250, bzip2)       # 固定执行250ms，bzip2工作负载

  # ===========================================
  # 示例2: 中等优先级任务
  # ===========================================
  - name: task_mid
    iat: 1000
    runtime: 400
    deadline: 1000
    params: "period=1000,wcet=400,arrival_offset=0,workload=bzip2"
    code:
      - fixed(400, bzip2)

  # ===========================================
  # 示例3: 低优先级任务
  # ===========================================
  - name: task_low
    iat: 2000
    runtime: 600
    deadline: 2000
    params: "period=2000,wcet=600,arrival_offset=0,workload=hash"
    code:
      - fixed(600, hash)

  # ===========================================
  # 示例4: 混合工作负载任务
  # ===========================================
  - name: task_mixed
    iat: 3000
    runtime: 800
    deadline: 3000
    params: "period=3000,wcet=800,arrival_offset=0,workload=idle"
    code:
      - fixed(300, idle)        # 前300ms空闲
      - fixed(500, bzip2)       # 后500ms压缩

  # ===========================================
  # 示例5: 多阶段任务（仅用于CASCADE）
  # ===========================================
  # 注意: EPP和ASAP不需要suspend(0)，直接用fixed()
  # CASCADE使用suspend(0)触发重新调度
  - name: task_cascade_style
    iat: 1500
    runtime: 300                # 6 × 50ms
    deadline: 1500
    params: "period=1500,wcet=300,arrival_offset=0,workload=bzip2"
    code:
      - fixed(50, bzip2)
      - fixed(50, bzip2)
      - fixed(50, bzip2)
      - fixed(50, bzip2)
      - fixed(50, bzip2)
      - fixed(50, bzip2)

  # ===========================================
  # 示例6: 带资源锁的任务（DAG支持）
  # ===========================================
  # - name: task_with_lock
  #   iat: 2000
  #   runtime: 500
  #   deadline: 2000
  #   params: "period=2000,wcet=500,arrival_offset=0,workload=bzip2"
  #   code:
  #     - lock(resource_A)      # 获取资源锁
  #     - fixed(500, bzip2)      # 执行任务
  #     - unlock(resource_A)    # 释放资源锁

  # ===========================================
  # 示例7: 背景任务（最低优先级）
  # ===========================================
  - name: task_background
    iat: 5000
    runtime: 1000
    deadline: 5000
    params: "period=5000,wcet=1000,arrival_offset=0,workload=idle"
    code:
      - fixed(1000, idle)       # 低能耗背景任务

# ---------------------------------------------
# 资源定义（可选，用于DAG任务）
# ---------------------------------------------
# resources:
#   - name: resource_A
#     initial_state: unlocked
#   - name: resource_B
#     initial_state: unlocked

# ---------------------------------------------
# 任务配置说明
# ---------------------------------------------
#
# 【任务属性说明】
#
# 1. name: 任务名称（唯一标识符）
#    - 命名建议: task_high, task_mid, task_low
#    - 或描述性命名: sensor_read, data_process, communication
#
# 2. iat (Inter-Arrival Time): 任务到达间隔 / 周期
#    - 单位: ms (毫秒)
#    - 周期越短，优先级越高
#    - 典型值: 100-5000ms
#
# 3. runtime: WCET (最坏执行时间)
#    - 单位: ms (毫秒)
#    - 必须等于code中所有fixed()时间之和
#    - 用于能量计算和可调度性分析
#
# 4. deadline: 绝对截止时间
#    - 单位: ms (毫秒)
#    - 通常等于iat（隐式截止时间）
#    - 也可以小于iat（严格截止时间）
#
# 5. params: 任务参数字符串
#    - period: 周期（通常等于iat）
#    - wcet: 最坏执行时间（必须等于runtime）
#    - arrival_offset: ⭐ 到达偏移量（默认0，推荐明确指定）
#      - 0: 立即到达
#      - >0: 延迟指定ms后到达（首次到达时间 = arrival_offset）
#      - 后续到达: arrival_offset + n × period
#      - 示例: offset=100, period=500 → 到达时间: 100, 600, 1100, ...
#    - workload: 工作负载类型（idle, bzip2, hash, encrypt, decrypt, control）
#
# 【指令说明】
#
# 1. fixed(time, workload): 固定执行时间指令
#    - time: 执行时间 (ms)
#    - workload: 工作负载类型
#    - 示例: fixed(250, bzip2)
#
# 2. lock(resource): 获取资源锁
#    - resource: 资源名称
#    - 如果资源已被锁定，任务等待
#    - 示例: lock(data_mutex)
#
# 3. unlock(resource): 释放资源锁
#    - resource: 资源名称
#    - 唤醒等待该资源的任务
#    - 示例: unlock(data_mutex)
#
# 4. suspend(0): 挂起指令（仅CASCADE使用）
#    - 立即挂起当前任务，触发重新调度
#    - 不消耗时间
#    - ⚠️ EPP和ASAP调度器不需要此指令
#
# 【工作负载类型】
#
# 1. idle: 空闲工作负载
#    - 能量系数: 0.1 (最低)
#    - 用于: 低能耗任务、等待状态
#
# 2. bzip2: 压缩工作负载
#    - 能量系数: 1.2 (高)
#    - 用于: 计算密集型任务
#
# 3. hash: 哈希工作负载
#    - 能量系数: 0.8 (中等)
#    - 用于: 加密、校验和计算
#
# 4. encrypt/decrypt: 加密/解密工作负载
#    - 能量系数: 1.5 (很高)
#    - 用于: 安全相关任务
#
# 5. control: 控制工作负载
#    - 能量系数: 0.1 (最低)
#    - 用于: 控制逻辑、状态检查
#
# 【任务设计原则】
#
# 1. 优先级设计:
#    - 周期短 = 优先级高
#    - task_high: iat=500ms
#    - task_mid: iat=1000ms
#    - task_low: iat=2000ms
#
# 2. 能量设计:
#    - 高能耗任务使用短周期（频繁调度）
#    - 低能耗任务使用长周期
#    - 考虑能量收集速率
#
# 3. 可调度性:
#    - 确保总利用率 ≤ 1 (单核)
#    - 利用率 = Σ(runtime/period)
#    - 示例: 250/500 + 400/1000 + 600/2000 = 0.5 + 0.4 + 0.3 = 1.2 > 1 ❌
#
# 4. 截止时间:
#    - 通常 deadline = iat
#    - 严格任务可设置 deadline < iat
#
# 5. arrival_offset 用途:
#    - 默认值: 0（立即到达）
#    - 阶梯启动: 设置不同偏移量错开任务到达
#    - 示例: task_1: offset=0, task_2: offset=100, task_3: offset=200
#
# 【使用示例】
#
# 1. 零能量测试（验证太阳能收集）:
#    task_high: iat=500, runtime=250, workload=bzip2
#    task_mid: iat=1000, runtime=400, workload=bzip2
#    task_low: iat=2000, runtime=600, workload=hash
#
# 2. 能量恢复测试:
#    初始能量0.5J，周期500ms任务需要0.3J
#    验证能量恢复机制是否正常工作
#
# 3. 级联调度测试:
#    5个任务，总能量需求 < max_energy
#    验证CASCADE调度器的级联行为
#
# 【运行命令】
# ./run_sim.sh -s system_config_template_complete.yml -t tasks_template_complete.yml -d 3000 -o trace.json
#
# =============================================

# =============================================
# PARTSim 任务集模板 - 完整版
# =============================================
# 适用于所有调度器: gpfp_asap, gpfp_cascade, gpfp_epp
# 包含各种任务类��和指令示例
# =============================================

# ---------------------------------------------
# 任务集定义
# ---------------------------------------------
taskset:
  # ===========================================
  # 示例1: 简单固定执行时间任务（推荐用于EPP）
  # ===========================================
  - name: task_high
    iat: 500                    # 任务到达间隔 / 周期 (ms)
    runtime: 250                # WCET: 最坏执行时间 (ms)
    deadline: 500               # 绝对截止时间 (ms)
    params: "period=500,wcet=250,arrival_offset=0,workload=bzip2"
    code:
      - fixed(250, bzip2)       # 固定执行250ms，bzip2工作负载

  # ===========================================
  # 示例2: 中等优先级任务
  # ===========================================
  - name: task_mid
    iat: 1000
    runtime: 400
    deadline: 1000
    params: "period=1000,wcet=400,arrival_offset=0,workload=bzip2"
    code:
      - fixed(400, bzip2)

  # ===========================================
  # 示例3: 低优先级任务
  # ===========================================
  - name: task_low
    iat: 2000
    runtime: 600
    deadline: 2000
    params: "period=2000,wcet=600,arrival_offset=0,workload=hash"
    code:
      - fixed(600, hash)

  # ===========================================
  # 示例4: 混合工作负载任务
  # ===========================================
  - name: task_mixed
    iat: 3000
    runtime: 800
    deadline: 3000
    params: "period=3000,wcet=800,arrival_offset=0,workload=idle"
    code:
      - fixed(300, idle)        # 前300ms空闲
      - fixed(500, bzip2)       # 后500ms压缩

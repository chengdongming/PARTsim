# =============================================
# ALAP Nonblock 特性测试任务集
# 测试场景：高优先级任务能量不足时选择低优先级任务
# 关键：让两个任务同时到达"必须执行"状态(Slack=0)
# 高优先级任务能量不足 -> 跳过 -> 选择低优先级任务
# =============================================

taskset:
  # 高优先级任务 - 高能量消耗(bzip2)
  # period=200, wcet=200 -> 到达时Slack=0
  - name: task_high
    iat: 200
    runtime: 200
    deadline: 200
    params: "period=200,wcet=200,arrival_offset=0,workload=bzip2"
    code:
      - fixed(200, bzip2)

  # 低优先级任务 - 低能量消耗(idle)
  # period=200, wcet=200 -> 到达时Slack=0，和高优先级同时到达临界点
  - name: task_low
    iat: 200
    runtime: 200
    deadline: 200
    params: "period=200,wcet=200,arrival_offset=0,workload=idle"
    code:
      - fixed(200, idle)

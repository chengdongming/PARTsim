# =============================================
# 测试：新实例到达时杀死旧实例
# =============================================
# 场景设计：
# - 单个任务，周期=10ms，WCET=15ms
# - 这样在第10ms时，新实例会到达，但旧实例（0-15ms）还在执行
# - 预期行为：旧实例在10ms时被杀死，新实例从10ms开始执行
# =============================================

taskset:
  # 任务1: 周期10ms，WCET 15ms（超过周期）
  - name: task_1
    iat: 10
    runtime: 15
    deadline: 10
    params: "period=10,wcet=15,arrival_offset=0,workload=bzip2"
    code:
      - fixed(15, bzip2)

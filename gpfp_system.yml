# =============================================
# 能量感知GPFP调度系统完整配置 - 优化版（已修复）
# 所有能量参数统一在配置文件中定义
# 时间单位：毫秒 (ms)
# 能量单位：焦耳 (J)
# 
# 修复说明：
# 1. 2.76倍时间差异：BP速度模型在1400MHz下速度=0.3627
#    解决方案：将基础频率提高到8100MHz，使速度>1.0
# 2. 1ms精度问题：exeinstr.cpp中的ceil()函数导致执行时间向上取整
#    解决方案：通过调整频率使速度超过1.0，避免ceil()函数的影响
# =============================================

# CPU集群配置
cpu_islands:
  - name: energy_aware_cpus
    numcpus: 2                           # CPU核心数量
    
    # =============================================
    # 调度器配置
    # =============================================
    kernel:
      scheduler: gpfp_efpp               # 调度算法：gpfp_asap | gpfp_cascade | gpfp_batch
      task_placement: global             # 任务放置策略
      
      # 调度器参数
      scheduler_params:
        - "unit_time=50"                 # 单位调度时间 (ms) - 关键参数！
        - "num_cores=2"                  # 处理器核心数量（与numcpus一致）
        - "base_frequency=8100"          # 基础频率 (MHz) - 精确修复：解决2.76倍时间差异
        - "start_time_offset=0"          # 开始时间偏移
        - "strict_priority=true"         # 严格优先级模式
        - "energy_stop_policy=true"      # 能量停止策略
        - "enable_energy_recovery=true"  # 启用能量恢复
        - "expected_task_count=5"       # 预期任务总数
        - "batch_mode=true"              # 启用批处理模式（仅对gpfp_batch有效）
        - "cascade_mode=true"            # CASCADE模式专用参数
    
    # =============================================
    # 电压频率配置
    # =============================================
    volts: [0.92, 0.94, 0.96, 0.98, 1.00, 1.02, 1.04, 1.06, 1.08, 1.10, 1.12, 1.14]  # 电压级别 (V)
    freqs: [7000, 7500, 8000, 8100, 8200, 8300, 8400, 8500, 9000, 9500, 10000, 10500]   # 频率级别 (MHz) - 精确修复
    base_freq: 8100                      # 基础工作频率 (MHz) - 精确修复：解决2.76倍时间差异
    
    # 功率和速度模型
    power_model: energy_aware_model      # 功率模型
    speed_model: energy_aware_model      # 速度模型

# =============================================
# 能量管理配置 - 所有参数在此定义
# =============================================
energy_management:
  # 基本能量参数
  initial_energy: 0.5                  # 初始能量 (J) - CASCADE测试
  max_energy: 1000                     # 最大能量容量 (J)
  
  # =============================================
  # 真实太阳能数据配置
  # =============================================
  use_real_solar_data: true           # 启用真实太阳能数据
  solar_data_file: "data/processed/shenyang_solar_minute.csv"  # NASA太阳能数据文件
  pv_efficiency: 0.18                 # 光伏转换效率 (18%)
  pv_area_m2: 1.0                     # 光伏板面积 (平方米)
  start_offset_minutes: 480           # 时间偏移（分钟），8点开始 (8*60=480) - 测试8点
  
  # 调度器单位时间
  unit_time: 50                          # 单位调度时间 (ms)
  
  # 能量恢复配置
  enable_energy_recovery: true           # 启用能量恢复
  max_recovery_wait_time_ms: 10000       # 最大恢复等待时间 (ms)

# =============================================
# 季节和时间配置 - 新增可配置参数
# =============================================
  # 季节范围配置（一年中的第几天）
  season_ranges:
    spring:
      start_day: 60    # 3月1日
      end_day: 151     # 5月31日
    summer:
      start_day: 152   # 6月1日
      end_day: 243     # 8月31日
    autumn:
      start_day: 244   # 9月1日
      end_day: 334     # 11月30日
    winter:
      start_day: 335   # 12月1日
      end_day: 365     # 2月28/29日
  
  # 一天中的时间范围配置（24小时制）
  time_ranges:
    night:
      start_hour: 22   # 22:00
      end_hour: 5      # 5:00（跨夜）
    morning:
      start_hour: 6    # 6:00
      end_hour: 11     # 11:00
    noon:
      start_hour: 12   # 12:00
      end_hour: 13     # 13:00
    afternoon:
      start_hour: 14   # 14:00
      end_hour: 17     # 17:00
    evening:
      start_hour: 18   # 18:00
      end_hour: 21     # 21:00
  
  # 不同时间段的能量收集倍率
  time_multipliers:
    night: 0.5         # 晚上：低收集率
    morning: 2.0       # 上午：中等收集率
    noon: 5.0          # 中午：最高收集率
    afternoon: 3.0     # 下午：中等收集率
    evening: 1.0       # 傍晚：较低收集率
  
  # 季节能量收集倍率
  seasonal_multipliers:
    spring: 0.9        # 春季：90%
    summer: 1.2        # 夏季：120%
    autumn: 0.8        # 秋季：80%
    winter: 0.6        # 冬季：60%
  
  # =============================================
  # 能量收集源配置
  # =============================================
  harvesting_sources:
    solar:
      enabled: true                      # 启用太阳能收集
      panel_area: 3.0                    # 太阳能板面积 (平方米)
      panel_efficiency: 0.22             # 太阳能板效率
      location_factors:
        latitude: 41.7922                # 纬度
        longitude: 123.4328              # 经度  
        altitude: 55                     # 海拔高度
      
    wind:
      enabled: true                      # 启用风能收集
      turbine_efficiency: 0.35           # 风力涡轮机效率
      wind_speed_avg: 5.2                # 平均风速 (米/秒)
  
  # =============================================
  # 能量消耗模型
  # =============================================
  consumption_model:
    base_power: 0.5                      # 基础功耗 (W)
    
    # 工作负载功率系数 (W)
    workload_coefficients:
      bzip2: 1.2                         # 压缩任务功率系数
      hash: 0.8                          # 哈希计算功率系数  
      encrypt: 1.5                       # 加密任务功率系数
      decrypt: 1.5                       # 解密任务功率系数
      control: 0.1                       # 控制任务功率系数
    
    # 频率-功率比例系数 - 精确修复：更新频率范围
    frequency_scaling:
      7000: 0.7                          # 7000MHz时的功率比例
      7500: 0.75                         # 7500MHz时的功率比例
      8000: 0.8                          # 8000MHz时的功率比例
      8100: 0.85                         # 8100MHz时的功率比例
      8200: 0.9                          # 8200MHz时的功率比例
      8300: 0.95                         # 8300MHz时的功率比例
      8400: 1.0                          # 8400MHz时的功率比例
      8500: 1.05                         # 8500MHz时的功率比例
      9000: 1.1                          # 9000MHz时的功率比例
      9500: 1.15                         # 9500MHz时的功率比例
      10000: 1.2                         # 10000MHz时的功率比例
      10500: 1.25                        # 10500MHz时的功率比例

  # =============================================
  # 能量阈值配置 (J)
  # =============================================
  energy_thresholds:
    critical: 50.0                       # 临界能量 - 只运行必要任务
    low: 100.0                           # 低能量 - 限制高功耗任务  
    normal: 200.0                        # 正常能量 - 全功能运行
    high: 400.0                          # 高能量 - 可运行所有任务

# =============================================
# 功率模型配置
# =============================================
power_models:
  - name: energy_aware_model
    type: balsini_pannocchi     # 功率模型类型
    
    # 工作负载功率参数
    params:
      - workload: idle                   # 空闲工作负载
        power_params: [0.00134845, 1.76307e-5, 124.535, 1.00399e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
        
      - workload: bzip2                  # 压缩工作负载
        power_params: [0.00775587, 33.376, 1.54585, 9.53439e-10]
        speed_params: [0.0256054, 2.9809e+6, 0.602631, 8.13712e+9]
        energy_coefficient: 1.2
        
      - workload: hash                   # 哈希工作负载
        power_params: [0.00624673, 176.315, 1.72836, 1.77362e-10]
        speed_params: [0.00645628, 3.37134e+6, 7.83177, 93459]
        energy_coefficient: 0.8
        
      - workload: encrypt                # 加密工作负载
        power_params: [0.00676544, 26.2243, 5.6071, 5.34216e-10]
        speed_params: [6.11496e-78, 3.32246e+6, 6.5652, 115759]
        energy_coefficient: 1.5
        
      - workload: decrypt                # 解密工作负载
        power_params: [0.00629664, 87.1519, 2.93286, 2.80871e-10]
        speed_params: [5.0154e-68, 3.31791e+6, 7.154, 112163]
        energy_coefficient: 1.5

# =============================================
# 环境感知配置
# =============================================
environmental_awareness:
  weather_integration: true              # 天气集成
  seasonal_adjustment: true              # 季节调整
  time_of_day_optimization: true         # 时间优化
  
  # 季节调整系数
  seasonal_factors:
    spring: 0.9                          # 春季能量收集系数
    summer: 1.2                          # 夏季能量收集系数  
    autumn: 0.8                          # 秋季能量收集系数
    winter: 0.6                          # 冬季能量收集系数

# =============================================
# 配置说明
# =============================================

# 1. 单位时间配置:
#    unit_time: 50 表示调度器每次调度执行50ms
#    能量收集和消耗都基于这个单位时间计算
#
# 2. 真实太阳能数据配置:
#    use_real_solar_data: true 启用NASA真实太阳能数据
#    solar_data_file: 数据文件路径
#    pv_efficiency: 光伏转换效率 (0.18 = 18%)
#    pv_area_m2: 光伏板面积 (平方米)
#    start_offset_minutes: 时间偏移（分钟）
#    
# 3. 典型任务能耗计算示例:
#    任务类型: encrypt (1.5W)
#    基础功耗: 0.5W
#    频率1400MHz: 0.9倍
#    总功耗: (0.5 + 1.5×0.9) = 1.85W
#    执行50ms消耗: 1.85 × 0.05 = 0.0925J
#
# 4. 开始时间偏移:
#    通过命令行参数 -st 指定
#    示例: -st 43200000 = 12:00:00
# =============================================

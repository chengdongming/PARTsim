# =============================================
# EPP 综合测试任务集：抢占性 + 不同到达时间
# =============================================
# 测试目标：
# 1. 验证Tick级抢占功能
# 2. 验证不同到达时间对调度的影响
# =============================================

taskset:
  # 任务1: 高优先级（周期500ms，最短），在0ms到达
  - name: task_high
    iat: 500
    runtime: 150
    deadline: 500
    params: "period=500,wcet=150,arrival_offset=0,workload=bzip2"
    code:
      - fixed(150, bzip2)

  # 任务2: 中等优先级（周期1000ms），在200ms到达（此时task_high正在执行）
  - name: task_mid
    iat: 1000
    runtime: 200
    deadline: 1000
    params: "period=1000,wcet=200,arrival_offset=200,workload=hash"
    code:
      - fixed(200, hash)

  # 任务3: 低优先级（周期1500ms，最长），在600ms到达（前两个任务都在执行）
  - name: task_low
    iat: 1500
    runtime: 250
    deadline: 1500
    params: "period=1500,wcet=250,arrival_offset=600,workload=idle"
    code:
      - fixed(250, idle)

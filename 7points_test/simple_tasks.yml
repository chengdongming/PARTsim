# =============================================
# 简单连续任务集 - 用于能量收集对比测试
# =============================================
# 目的：创建一个持续运行的任务，使ASAP能够持续收集能量
# 策略：使用长时间运行的任务，确保整个仿真期间CPU都在工作
# =============================================

taskset:
  # task_continuous: 长时间运行任务 - 确保整个测试期间都在运行
  - name: task_continuous
    iat: 10000           # 任务到达间隔：10000ms (大于仿真时间1000ms，确保只到达一次)
    runtime: 5000        # WCET: 5000ms (大于仿真时间1000ms，确保持续运行)
    deadline: 10000
    params: "period=10000,wcet=5000,workload=idle"
    code:
      - fixed(5000, idle)  # 执行5000ms，覆盖整个1000ms仿真时间

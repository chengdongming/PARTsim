# =============================================
# PARTSim 任务集配置
# =============================================

taskset:
  - name: task_high
    iat: 500
    runtime: 250
    deadline: 500
    params: "period=500,wcet=250,arrival_offset=0,workload=bzip2"
    code:
      - fixed(250, bzip2)

  - name: task_mid
    iat: 1000
    runtime: 400
    deadline: 1000
    params: "period=1000,wcet=400,arrival_offset=0,workload=bzip2"
    code:
      - fixed(400, bzip2)

  - name: task_low
    iat: 2000
    runtime: 600
    deadline: 2000
    params: "period=2000,wcet=600,arrival_offset=0,workload=hash"
    code:
      - fixed(600, hash)

  - name: task_mixed
    iat: 3000
    runtime: 800
    deadline: 3000
    params: "period=3000,wcet=800,arrival_offset=0,workload=idle"
    code:
      - fixed(300, idle)
      - fixed(500, bzip2)

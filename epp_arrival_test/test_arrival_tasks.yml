# =============================================
# EPP 不同到达时间测试任务集
# =============================================
# 测试��标：验证不同到达时间的任务调度顺序
# 场景：3个不同优先级的任务，在不同时间到达
# =============================================

taskset:
  # 任务1: 高优先级（周期最短），在0ms到达
  - name: task_high
    iat: 500
    runtime: 150
    deadline: 500
    params: "period=500,wcet=150,arrival_offset=0,workload=bzip2"
    code:
      - fixed(150, bzip2)

  # 任务2: 中等优先级，在300ms到达（此时task_high还在执行）
  - name: task_mid
    iat: 1000
    runtime: 200
    deadline: 1000
    params: "period=1000,wcet=200,arrival_offset=300,workload=hash"
    code:
      - fixed(200, hash)

  # 任务3: 低优先级（周期最长），在800ms到达
  - name: task_low
    iat: 1500
    runtime: 250
    deadline: 1500
    params: "period=1500,wcet=250,arrival_offset=800,workload=idle"
    code:
      - fixed(250, idle)

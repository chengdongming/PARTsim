# =============================================
# TIE调度器能量测试 - 任务集配置
# =============================================
# 4个不同优先级的周期性任务
# =============================================

taskset:
  # ===========================================
  # 任务1: 高优先级 (周期最短 500ms)
  # 能耗: ~0.558J × 0.25s = 0.1395J (总)
  #      每ms: 0.000558J = 558μJ
  # ===========================================
  - name: task_high
    iat: 500
    runtime: 250
    deadline: 500
    params: "period=500,wcet=250,arrival_offset=0,workload=bzip2"
    code:
      - fixed(250, bzip2)

  # ===========================================
  # 任务2: 中优先级 (周期 1000ms)
  # 能耗: ~0.558J × 0.4s = 0.2232J (总)
  #      每ms: 0.000558J = 558μJ
  # ===========================================
  - name: task_mid
    iat: 1000
    runtime: 400
    deadline: 1000
    params: "period=1000,wcet=400,arrival_offset=0,workload=bzip2"
    code:
      - fixed(400, bzip2)

  # ===========================================
  # 任务3: 低优先级 (周期 2000ms)
  # 能耗: ~0.372J × 0.6s = 0.2232J (总)
  #      每ms: 0.000372J = 372μJ
  # ===========================================
  - name: task_low
    iat: 2000
    runtime: 600
    deadline: 2000
    params: "period=2000,wcet=600,arrival_offset=0,workload=hash"
    code:
      - fixed(600, hash)

  # ===========================================
  # 任务4: 后台任务 (周期 3000ms, 最低优先级)
  # 能耗: ~0.0465J × 0.8s = 0.0372J (总)
  #      每ms: 0.0000465J = 46.5μJ
  # ===========================================
  - name: task_background
    iat: 3000
    runtime: 800
    deadline: 3000
    params: "period=3000,wcet=800,arrival_offset=0,workload=idle"
    code:
      - fixed(800, idle)

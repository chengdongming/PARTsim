taskset:
  # Task1: 最高优先级，高单位能耗 - 相同WCET但功耗高
  - name: task1_high_unit_cost
    iat: 200
    runtime: 10
    deadline: 200
    params: "period=200,wcet=10,arrival_offset=0,workload=bzip2"
    code:
      - fixed(10, bzip2)

  # Task2: 次优先级，中单位能耗
  - name: task2_mid_unit_cost
    iat: 200
    runtime: 10
    deadline: 200
    params: "period=200,wcet=10,arrival_offset=0,workload=hash"
    code:
      - fixed(10, hash)

  # Task3: 低优先级，低单位能耗 - 可调度！
  - name: task3_low_unit_cost
    iat: 300
    runtime: 10
    deadline: 300
    params: "period=300,wcet=10,arrival_offset=0,workload=control"
    code:
      - fixed(10, control)

    params: "period=200,wcet=50,arrival_offset=0,workload=bzip2"
    code:
      - fixed(50, bzip2)

  # Task2: 次优先级，高能耗 - 需要0.025J才能完成WCET
  - name: task2_high_cost
    iat: 200
    runtime: 50
    deadline: 200
    params: "period=200,wcet=50,arrival_offset=0,workload=bzip2"
    code:
      - fixed(50, bzip2)

  # Task3: 低优先级，低能耗 - 只需要0.0025J完成WCET - 可调度！

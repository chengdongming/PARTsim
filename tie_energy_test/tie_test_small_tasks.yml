# =============================================
# TIE调度器能量测试 - 任务集配置
# =============================================
# 4个不同优先级的周期性任务
# =============================================

taskset:
  # ===========================================
  # 任务1: 高优先级 (周期最短 100ms)
  # 能耗: 0.5W × 1.2 × 0.03s = 0.018J (总)
  #      每ms: 0.018/30 = 0.0006J
  # ===========================================
  - name: task_high
    iat: 100
    runtime: 30
    deadline: 100
    params: "period=100,wcet=30,arrival_offset=0,workload=bzip2"
    code:
      - fixed(30, bzip2)

  # ===========================================
  # 任务2: 中优先级 (周期 150ms)
  # 能耗: 0.5W × 0.8 × 0.05s = 0.020J (总)
  #      每ms: 0.020/50 = 0.0004J
  # ===========================================
  - name: task_mid
    iat: 150
    runtime: 50
    deadline: 150
    params: "period=150,wcet=50,arrival_offset=0,workload=hash"
    code:
      - fixed(50, hash)

  # ===========================================
  # 任务3: 低优先级 (周期 200ms)
  # 能耗: 0.5W × 0.1 × 0.04s = 0.002J (总)
  #      每ms: 0.002/40 = 0.00005J
  # ===========================================
  - name: task_low
    iat: 200
    runtime: 40
    deadline: 200
    params: "period=200,wcet=40,arrival_offset=0,workload=control"
    code:
      - fixed(40, control)

  # ===========================================
  # 任务4: 后台任务 (周期 300ms, 最低优先级)
  # 能耗: 0.5W × 0.1 × 0.06s = 0.003J (总)
  #      每ms: 0.003/60 = 0.00005J
  # ===========================================
  - name: task_background
    iat: 300
    runtime: 60
    deadline: 300
    params: "period=300,wcet=60,arrival_offset=0,workload=idle"
    code:
      - fixed(60, idle)

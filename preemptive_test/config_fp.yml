# FP抢占式调度配置
simulation:
  duration: 500  # 仿真时长500ms

scheduler:
  type: "FPScheduler"
  name: "FP"
  priorities:
    - task: "task_high"
      priority: 1    # 优先级1最高
    - task: "task_mid"
      priority: 2    # 优先级2中等
    - task: "task_low"
      priority: 3    # 优先级3最低

kernel:
  type: "MRTKernel"
  name: "kernel_fp"
  cpus:
    - name: "CPU0"
      frequency: 8100  # MHz
      base_speed: 1.0

tasks:
  - name: "task_high"
    type: "PeriodicTask"
    period: 50
    deadline: 50
    phase: 0
    priority: 1
    instructions:
      - type: "fixed"
        duration: 10
        workload: "bzip2"

  - name: "task_mid"
    type: "PeriodicTask"
    period: 100
    deadline: 100
    phase: 0
    priority: 2
    instructions:
      - type: "fixed"
        duration: 20
        workload: "crc32"

  - name: "task_low"
    type: "PeriodicTask"
    period: 200
    deadline: 200
    phase: 0
    priority: 3
    instructions:
      - type: "fixed"
        duration: 30
        workload: "basicmath"

energy:
  enabled: false
  initial_energy: 1000.0

trace:
  output_file: "trace_fp.json"
  log_schedules: true
  log_preemptions: true
  log_deadline_misses: true

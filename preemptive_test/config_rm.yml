# RM抢占式调度配置
simulation:
  duration: 500  # 仿真时长500ms

scheduler:
  type: "RMScheduler"
  name: "RM"
  # RM调度器自动根据周期分配优先级：
  # - 周期越短，优先级越高
  # - task_high (50ms)  → 优先级最高
  # - task_mid (100ms)  → 优先级中
  # - task_low (200ms)  → 优先级最低

kernel:
  type: "MRTKernel"
  name: "kernel_rm"
  cpus:
    - name: "CPU0"
      frequency: 8100  # MHz
      base_speed: 1.0

tasks:
  - name: "task_high"
    type: "PeriodicTask"
    period: 50         # 最短周期 → 最高优先级
    deadline: 50
    phase: 0
    instructions:
      - type: "fixed"
        duration: 10
        workload: "bzip2"

  - name: "task_mid"
    type: "PeriodicTask"
    period: 100        # 中周期
    deadline: 100
    phase: 0
    instructions:
      - type: "fixed"
        duration: 20
        workload: "crc32"

  - name: "task_low"
    type: "PeriodicTask"
    period: 200        # 最长周期 → 最低优先级
    deadline: 200
    phase: 0
    instructions:
      - type: "fixed"
        duration: 30
        workload: "basicmath"

energy:
  enabled: false
  initial_energy: 1000.0

trace:
  output_file: "trace_rm.json"
  log_schedules: true
  log_preemptions: true
  log_deadline_misses: true

# V130 ST-Sync调度器测试系统配置：3核心5任务（完整仿真版本）
# 初始能量充足，确保300ms完整仿真

cpu_islands:
  - name: st_test_cpus
    numcpus: 3

    kernel:
      scheduler: gpfp_st_sync
      task_placement: global

    volts: [1.08]
    freqs: [8100]
    base_freq: 8100
    power_model: st_test_model
    speed_model: st_test_model

energy_management:
  initial_energy: 0.15        # 初始 150mJ（充足能量）
  max_energy: 0.5             # 最大 500mJ
  day_of_year: 182
  time_of_day_ms: 43200000    # 12:00
  use_real_solar_data: false
  solar_data_file: ""
  pv_efficiency: 0.18
  pv_area_m2: 0.01
  base_harvesting_rate: 0.030  # 30mW 收集率

  scheduler_energy_model:
    base_power: 0.5
    workload_coefficients:
      bzip2: 0.6
      hash: 0.5
      encrypt: 0.8
      control: 0.3
      idle: 0.1
    frequency_power_ratios:
      - 8100: 1.0

power_models:
  - name: st_test_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0.001, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
      - workload: bzip2
        power_params: [0.006, 30, 1.5, 1e-10]
        speed_params: [0.025, 2.98e6, 0.6, 8.1e9]
        energy_coefficient: 0.6
      - workload: hash
        power_params: [0.005, 150, 1.7, 2e-10]
        speed_params: [0.006, 3.3e6, 7.8, 93459]
        energy_coefficient: 0.5
      - workload: encrypt
        power_params: [0.007, 25, 5.5, 5e-10]
        speed_params: [6e-78, 3.3e6, 6.5, 115759]
        energy_coefficient: 0.8
      - workload: control
        power_params: [0.001, 1.0, 1.0, 1e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.3

speed_models:
  - name: st_test_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0.001, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
      - workload: bzip2
        power_params: [0.006, 30, 1.5, 1e-10]
        speed_params: [0.025, 2.98e6, 0.6, 8.1e9]
        energy_coefficient: 0.6
      - workload: hash
        power_params: [0.005, 150, 1.7, 2e-10]
        speed_params: [0.006, 3.3e6, 7.8, 93459]
        energy_coefficient: 0.5
      - workload: encrypt
        power_params: [0.007, 25, 5.5, 5e-10]
        speed_params: [6e-78, 3.3e6, 6.5, 115759]
        energy_coefficient: 0.8
      - workload: control
        power_params: [0.001, 1.0, 1.0, 1e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.3

# ST-Sync 测试配置：3核心5任务，时长800ms
# 测试批量调度和全组挂起

cpu_islands:
  - name: test_cpus
    numcpus: 3
    kernel:
      scheduler: gpfp_st_sync
      task_placement: global
    volts: [1.08]
    freqs: [8100]
    base_freq: 8100
    power_model: test_model
    speed_model: test_model

energy_management:
  initial_energy: 0.05        # 初始能量 50mJ
  max_energy: 0.1             # 最大 100mJ
  day_of_year: 1
  time_of_day_ms: 43200000    # 正午12:00 (太阳能最强)
  use_real_solar_data: false
  solar_data_file: ""
  pv_efficiency: 0.18
  pv_area_m2: 0.01
  periodic_collection_interval_ms: 1
  enable_energy_recovery: true
  max_recovery_wait_time_ms: 50
  base_harvesting_rate: 0.003  # 3mW 收集率

  scheduler_energy_model:
    base_power: 0.5
    workload_coefficients:
      bzip2: 0.6
      hash: 0.5
      encrypt: 0.8
      control: 0.3
      idle: 0.1
    frequency_power_ratios:
      - 8100: 1.0

power_models:
  - name: test_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
      - workload: bzip2
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.6
      - workload: hash
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.5
      - workload: encrypt
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.8
      - workload: control
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.3

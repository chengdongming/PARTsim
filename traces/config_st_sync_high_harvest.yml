# ST-Sync 高能量收集测试配置 - 验证唤醒机制
cpu_islands:
  - name: test_cpus
    numcpus: 3
    kernel:
      scheduler: gpfp_st_sync
      task_placement: global
    volts: [1.08]
    freqs: [8100]
    base_freq: 8100
    power_model: test_model
    speed_model: test_model

energy_management:
  initial_energy: 0.08        # 初始能量 80mJ
  max_energy: 0.2             # 最大 200mJ
  day_of_year: 1
  time_of_day_ms: 28800000      # 8:00 AM
  use_real_solar_data: false
  solar_data_file: ""
  pv_efficiency: 0.18
  pv_area_m2: 0.01
  periodic_collection_interval_ms: 1
  enable_energy_recovery: true
  max_recovery_wait_time_ms: 50
  base_harvesting_rate: 0.3     # 300mW 收集率 (0.3mJ/ms) - 足够在Slack时间内充电

  scheduler_energy_model:
    base_power: 0.5
    workload_coefficients:
      bzip2: 1.2
      hash: 0.8
      encrypt: 1.5
      control: 0.1
      idle: 0.1
    frequency_power_ratios:
      - 8100: 1.0

power_models:
  - name: test_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
      - workload: bzip2
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 1.2
      - workload: hash
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.8
      - workload: encrypt
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 1.5
      - workload: control
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1

# V130 测试任务集：3核心5任务
# 用于测试深度休眠锁和ASAP贪婪调度

taskset:
  # 高优先级任务 (短周期)
  - name: Task_High1
    iat: 50
    runtime: 10
    deadline: 50
    startcpu: 0
    params: "period=50,wcet=10,workload=control"
    code:
      - fixed(10, control)

  - name: Task_High2
    iat: 60
    runtime: 8
    deadline: 60
    startcpu: 1
    params: "period=60,wcet=8,workload=hash"
    code:
      - fixed(8, hash)

  # 中优先级任务
  - name: Task_Mid1
    iat: 100
    runtime: 15
    deadline: 100
    startcpu: 2
    params: "period=100,wcet=15,workload=bzip2"
    code:
      - fixed(15, bzip2)

  - name: Task_Mid2
    iat: 120
    runtime: 12
    deadline: 120
    startcpu: 0
    params: "period=120,wcet=12,workload=hash"
    code:
      - fixed(12, hash)

  # 低优先级任务 (长周期)
  - name: Task_Low1
    iat: 200
    runtime: 20
    deadline: 200
    startcpu: 1
    params: "period=200,wcet=20,workload=encrypt"
    code:
      - fixed(20, encrypt)

# V130 ST-NonBlock调度器测试系统配置：3核心5任务（高能量版本）
# 用于测试3核心同时调度

cpu_islands:
  - name: st_test_cpus
    numcpus: 3

    kernel:
      scheduler: gpfp_st_nonblock
      task_placement: global

    # 电压频率配置
    volts: [1.08]
    freqs: [8100]
    base_freq: 8100

    # 功率和速度模型
    power_model: st_test_model
    speed_model: st_test_model

# =============================================
# 能量管理配置 - V130测试（高能量版本）
# =============================================
energy_management:
  # 基本能量参数 - 充足能量测试3核心调度
  initial_energy: 0.05        # 初始 50mJ（足够调度多个任务）
  max_energy: 0.2             # 最大 200mJ

  # 时间设置：中午12点（有太阳能充电）
  day_of_year: 182
  time_of_day_ms: 43200000    # 12:00

  # 太阳能配置
  use_real_solar_data: false
  solar_data_file: ""
  pv_efficiency: 0.18
  pv_area_m2: 0.01
  base_harvesting_rate: 0.010  # 10mW 收集率

  # 调度器能量模型
  scheduler_energy_model:
    base_power: 0.5
    workload_coefficients:
      bzip2: 0.6
      hash: 0.5
      encrypt: 0.8
      control: 0.3
      idle: 0.1
    frequency_power_ratios:
      - 8100: 1.0

# =============================================
# 功率模型配置
# =============================================
power_models:
  - name: st_test_model
    type: balsini_pannocchi

    params:
      - workload: idle
        power_params: [0.001, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1

      - workload: bzip2
        power_params: [0.006, 30, 1.5, 1e-10]
        speed_params: [0.025, 2.98e6, 0.6, 8.1e9]
        energy_coefficient: 0.6

      - workload: hash
        power_params: [0.005, 150, 1.7, 2e-10]
        speed_params: [0.006, 3.3e6, 7.8, 93459]
        energy_coefficient: 0.5

      - workload: encrypt
        power_params: [0.007, 25, 5.5, 5e-10]
        speed_params: [6e-78, 3.3e6, 6.5, 115759]
        energy_coefficient: 0.8

      - workload: control
        power_params: [0.001, 1.0, 1.0, 1e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.3

# =============================================
# 速度模型配置
# =============================================
speed_models:
  - name: st_test_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0.001, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1

      - workload: bzip2
        power_params: [0.006, 30, 1.5, 1e-10]
        speed_params: [0.025, 2.98e6, 0.6, 8.1e9]
        energy_coefficient: 0.6

      - workload: hash
        power_params: [0.005, 150, 1.7, 2e-10]
        speed_params: [0.006, 3.3e6, 7.8, 93459]
        energy_coefficient: 0.5

      - workload: encrypt
        power_params: [0.007, 25, 5.5, 5e-10]
        speed_params: [6e-78, 3.3e6, 6.5, 115759]
        energy_coefficient: 0.8

      - workload: control
        power_params: [0.001, 1.0, 1.0, 1e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.3

# CPU集群配置
cpu_islands:
  - name: energy_aware_cpus
    numcpus: 2                           # CPU核心数量

    kernel:
      scheduler: gpfp_cascade            # 调度算法: gpfp_asap | gpfp_cascade | gpfp_batch
      task_placement: global

      # 调度器参数（仅CASCADE专用参数）
      scheduler_params:
        - "strict_priority=true"         # 严格优先级模式
        - "energy_stop_policy=true"      # 能量停止策略
        - "expected_task_count=5"        # 预期任务总数（内部队列大小）
        - "cascade_mode=true"            # CASCADE模式开关

    # 电压频率配置
    volts: [0.92, 0.94, 0.96, 0.98, 1.00, 1.02, 1.04, 1.06, 1.08, 1.10, 1.12, 1.14]
    freqs: [7000, 7500, 8000, 8100, 8200, 8300, 8400, 8500, 9000, 9500, 10000, 10500]
    base_freq: 8100

    # 功率和速度模型
    power_model: energy_aware_model
    speed_model: energy_aware_model

# =============================================
# 能量管理配置 - NASA太阳能数据 + 新时间参数
# =============================================
energy_management:
  # 基本能量参数
  initial_energy: 100.0                # 初始能量 (J) - 根据测试需求调整
  max_energy: 1000.0                   # 最大能量容量 (J)

  # === ⭐ 新的时间参数设计 ===
  # 参数1: 一年中的第几天 (1-366)
  #    - 1 = 1月1日
  #    - 187 = 7月6日左右 (夏季中间，最大太阳能)
  #    - 365 = 12月31日
  day_of_year: 187

  # 参数2: 一天中的时间 (毫秒, 0-86399999)
  #    - 0 = 00:00:00 (午夜)
  #    - 28800000 = 08:00:00 (早上8点)
  #    - 43200000 = 12:00:00 (中午12点)
  #    - 72000000 = 20:00:00 (晚上8点)
  #    - 86399999 = 23:59:59.999
  time_of_day_ms: 0

  # === NASA真实太阳能数据配置 ===
  use_real_solar_data: true            # 启用NASA真实太阳能数据
  solar_data_file: "data/processed/shenyang_solar_minute.csv"  # NASA数据文件路径
  pv_efficiency: 0.18                  # 光伏转换效率 (18%)
  pv_area_m2: 1.0                      # 光伏板面积 (平方米)

  # 调度器单位时间
  unit_time: 50                        # 单位时间 (ms)

  # 能量恢复配置
  enable_energy_recovery: true
  max_recovery_wait_time_ms: 10000

# =============================================
# 功率模型配置
# =============================================
power_models:
  - name: energy_aware_model
    type: balsini_pannocchi

    params:
      # 空闲工作负载
      - workload: idle
        power_params: [0.00134845, 1.76307e-5, 124.535, 1.00399e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1

      # 压缩工作负载
      - workload: bzip2
        power_params: [0.00775587, 33.376, 1.54585, 9.53439e-10]
        speed_params: [0.0256054, 2.9809e+6, 0.602631, 8.13712e+9]
        energy_coefficient: 1.2

      # 哈希工作负载
      - workload: hash
        power_params: [0.00624673, 176.315, 1.72836, 1.77362e-10]
        speed_params: [0.00645628, 3.37134e+6, 7.83177, 93459]
        energy_coefficient: 0.8

      # 加密工作负载
      - workload: encrypt
        power_params: [0.00676544, 26.2243, 5.6071, 5.34216e-10]
        speed_params: [6.11496e-78, 3.32246e+6, 6.5652, 115759]
        energy_coefficient: 1.5

      # 解密工作负载
      - workload: decrypt
        power_params: [0.00629664, 87.1519, 2.93286, 2.80871e-10]
        speed_params: [5.0154e-68, 3.31791e+6, 7.154, 112163]
        energy_coefficient: 1.5

      # 控制工作负载
      - workload: control
        power_params: [0.001, 1.0, 1.0, 1.0e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1

# =============================================
# 配置说明
# =============================================
#
# 关键参数说明：
#
# 1. initial_energy: 初始能量（焦耳）
#    - 低能量测试：0.5 - 10 J
#    - 中等能量：50 - 100 J
#    - 高能量：500 - 1000 J
#
# 2. pv_efficiency: 光伏转换效率
#    - 商业光伏板：15-20%
#    - 高效光伏板：20-25%
#
# 3. pv_area_m2: 光伏板面积（平方米）
#    - 小型系统：0.5 - 1.0 m²
#    - 中型系统：1.0 - 3.0 m²
#    - 大型系统：3.0 - 10.0 m²
#
# 4. day_of_year: 一年中的第几天 (1-366)
#    - 1 = 1月1日
#    - 32 = 2月1日
#    - 60 = 3月1日 (非闰年)
#    - 187 = 7月6日左右 (夏季中间，最大太阳能)
#    - 365 = 12月31日
#    - 366 = 12月31日 (闰年)
#
# 5. time_of_day_ms: 一天中的时间 (毫秒)
#    - 0 = 00:00:00 (午夜)
#    - 21600000 = 06:00:00 (早上6点)
#    - 28800000 = 08:00:00 (早上8点)
#    - 43200000 = 12:00:00 (中午12点)
#    - 64800000 = 18:00:00 (傍晚6点)
#    - 72000000 = 20:00:00 (晚上8点)
#    - 86399999 = 23:59:59.999 (午夜前一毫秒)
#
# 6. 常用时间组合示例：
#    - 夏季正午: day_of_year: 187, time_of_day_ms: 43200000
#    - 夏季午夜: day_of_year: 187, time_of_day_ms: 0
#    - 夏季早上: day_of_year: 187, time_of_day_ms: 28800000
#    - 冬季正午: day_of_year: 1, time_of_day_ms: 43200000
#    - 冬季午夜: day_of_year: 1, time_of_day_ms: 0
#
# 7. 能量收集预期（基于沈阳数据，1.0m²光伏板，18%效率）：
#    - 夏季正午 (day 187, 12:00): ~900 W/m² → ~162 W → ~0.162 J/ms → ~8.1 J/50ms
#    - 夏季早上 (day 187, 08:00): ~480 W/m² → ~86 W → ~0.086 J/ms → ~4.3 J/50ms
#    - 夏季午夜 (day 187, 00:00): ~0 W/m² → ~0 W → ~0 J/ms
#    - 冬季正午 (day 1, 12:00): ~300 W/m² → ~54 W → ~0.054 J/ms → ~2.7 J/50ms
#    - 冬季午夜 (day 1, 00:00): ~0 W/m² → ~0 W → ~0 J/ms
#
# 8. 工作负载能耗（50ms时间片，8100kHz）：
#    - bzip2: 0.100000 J/时间片 (高能耗)
#    - hash: 0.064000 J/时间片 (中等能耗)
#    - idle: 0.031250 J/时间片 (低能耗)
#    - control: 0.031250 J/时间片 (低能耗)
#
# 9. 使用run_sim.sh运行测试：
#     ./run_sim.sh -s system_config_unified_template.yml -t tasks.yml -d 3000 -o trace.json
#
# =============================================

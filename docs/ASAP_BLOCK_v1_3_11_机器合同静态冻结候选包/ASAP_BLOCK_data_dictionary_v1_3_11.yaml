  authority: field_type_nullability_unit_and_enum_index
  canonical_serialization_file: ASAP_BLOCK_canonical_serialization_v1_3_11.yaml
  description: Field types and nullability for ASAP-BLOCK v1.3.11 machine contract.
global_type_definitions:
  hash_sha256: 64 lowercase hexadecimal characters
  identifier: nonempty NFC string generated by a frozen domain-separated ID preimage
  canonical_number: canonical integer or reduced num/den rational; denominator positive; gcd=1; -0/float/NaN/Inf forbidden
  enum_set: sorted unique members from enum_ref separated by |; empty only when permitted
  timestamp: strict RFC3339 UTC with Z and valid calendar time
  canonical_primary_key: canonical JSON array of primary-key scalar strings

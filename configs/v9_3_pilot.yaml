pilot_version: 1
rta_version: v9.3
contract_version: 1.3.12

task_generation:
  task_n: 10
  M: 4
  deadline_mode: implicit
  task_p_min: 40
  task_p_max: 200
  min_task_util: 0.01
  max_task_util: 0.8
  wcet_rounding: compensated
  actual_utilization_tolerance_total: 0.01
  normalized_utilizations: [0.2, 0.4, 0.6]
  initial_energy_lower_bounds: [0, 1]
  num_tasksets_per_cell: 10
  smoke_tasksets_per_cell: 2
  base_seed: 930012

analysis:
  variants:
    - CW_D
    - LOC_D
    - CW_THETA_CW
    - LOC_THETA_CW
    - LOC_THETA_LOC
  timeout_seconds_per_configuration: 15
  max_workers: 1

# This is the existing RTA-only paper-experiment convention used by the
# v20.4/v21 comparison, ablation, and sensitivity runners.  E0 below is the
# independent release-time lower bound, not simulation battery state at t=0.
energy_model:
  system_template: system_config_unified_template.yml
  battery_capacity_j: 20
  simulation_initial_energy_ratio: 1
  use_real_solar_data: false
  solar_time_ms: 21975000
  harvesting_scale: 1
  service_curve_horizon_ms: 30000
  service_curve_profile: synthetic_piecewise_default
  tick_ms: 1
  energy_numeric_mode: EXACT_RATIONAL
  energy_demand_rounding: EXACT
  energy_supply_rounding: EXACT

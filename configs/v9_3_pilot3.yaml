pilot_version: 3
rta_version: v9.3
contract_version: 1.3.12

pilot2:
  artifact_root: artifacts/v9_3_pilot2
  expected_separation_intervals: 3675

e0_selection:
  max_data_values: 5
  minimum_exact_separation: 1/1000
  quantiles: [p05, median, p95]
  controls: [0, 1]

screening:
  task_n: 10
  M: 4
  deadline_mode: implicit
  power_mode: generator_default_heterogeneous
  normalized_utilizations: [0.4, 0.6]
  tasksets_per_utilization: 5
  base_seed: 930312
  generation:
    task_p_min: 40
    task_p_max: 200
    min_task_util: 0.01
    max_task_util: 0.8
    wcet_rounding: compensated
    actual_utilization_tolerance_total: 0.01
    workload_contract_version: REAL_TIME_TASK_WORKLOAD_CONTRACT_V2
    workload_candidates: [bzip2, control, decrypt, encrypt, hash]

timeout:
  initial_seconds: 60
  retry_seconds: 90
  max_workers: 1

diagnostics:
  replay_seconds_per_task: 60
  retry_diagnostic_timeout: false
  skip_production_timeout_tasks: true

confirmation:
  tasksets_per_cell: 20
  max_cells: 2
  base_seed: 930412

analysis:
  variants: [CW_D, LOC_D, CW_THETA_CW, LOC_THETA_CW, LOC_THETA_LOC]
  numerical_mode: EXACT_RATIONAL
  max_workers: 1

energy_model:
  system_template: system_config_unified_template.yml
  battery_capacity_j: 20
  simulation_initial_energy_ratio: 1
  use_real_solar_data: false
  solar_time_ms: 21975000
  harvesting_scale: 1
  service_curve_horizon_ms: 30000
  service_curve_profile: synthetic_piecewise_default
  tick_ms: 1
  energy_numeric_mode: EXACT_RATIONAL
  energy_demand_rounding: EXACT
  energy_supply_rounding: EXACT

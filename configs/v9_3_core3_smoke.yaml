experiment_id: asap-block-v9.3-core3-smoke
core: CORE-3
platform:
  cores: [4]
  task_count: [10]
generation:
  deadline_mode: constrained
  constrained_deadline:
    d_over_t_values: []
    d_over_t_min: "0"
    d_over_t_max: "1"
    distribution: generator_uniform_integer
  period_min: 40
  period_max: 200
  wcet_rounding: compensated
  utilization_tolerance: "0.01"
  min_task_util: "0.01"
  max_task_util: "0.8"
  priority_policy: RM
  power_mode: generator_default_heterogeneous
  generator_timeout_seconds: 120
energy:
  initial_energy_values: ["1"]
  simulation_initial_battery: "20"
  exact_rational_encoding: canonical_fraction
  service_curve:
    id: paired-real-solar-service-v1
    system_template: system_config_unified_template.yml
    horizon: 30000
  battery_mode: finite
  battery_capacity: "100"
grid:
  utilization_points: ["0.2", "0.3"]
  tasksets_per_cell: 1
  base_seed: 930433
  seed_mode: generation_dimensions
rta:
  methods: [CW_THETA_CW, LOC_THETA_LOC]
  timeout_seconds: 4
  retry_timeout_seconds: 8
  retry_policy: timeout_once
  numerical_mode: EXACT_RATIONAL
simulation:
  horizon: 800
  warmup: 0
  minimum_jobs_per_task: 3
  maximum_horizon: 1600
  horizon_extension_policy: double
  deadline_miss_fail_fast: true
  timeout_seconds: 30
  trace_mode: semantic
  trace_on_failure: true
  simulator_bin: ./build/rtsim/rtsim
execution:
  worker_count: 1
  checkpoint_every: 1
  output_root: artifacts/v9_3_core3_smoke
  taskset_store: artifacts/v9_3_core3_taskset_store_smoke
  resume: false
  fail_fast_on_p0: true
  preserve_attempt_history: true
plots: {}

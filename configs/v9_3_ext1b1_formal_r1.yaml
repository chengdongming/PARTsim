# Frozen EXT-1B B1 formal campaign anchor.
#
# The strict public EXT-1B schema is single-cell.  The companion formal
# contract owns the ordered six-shard expansion and binds every cell-specific
# seed, path, config hash, paired-taskset identity, and request identity.
experiment_id: asap-block-v9.3-ext1b1-formal-r1
core: CORE-3
extension: EXT-1B
parameter_status: FROZEN_FOR_FORMAL_EXECUTION
seed_space: EXT1B_FORMAL
platform: {cores: [4], task_count: [10]}
generation:
  deadline_mode: constrained
  constrained_deadline: {d_over_t_values: [], d_over_t_min: "0", d_over_t_max: "1", distribution: generator_uniform_integer}
  period_min: 40
  period_max: 200
  wcet_rounding: compensated
  utilization_tolerance: "1/100"
  min_task_util: "1/100"
  max_task_util: "4/5"
  priority_policy: RM
  power_mode: generator_default_heterogeneous
  generator_timeout_seconds: 120
energy:
  initial_energy_values: ["0"]
  simulation_initial_battery: "1"
  exact_rational_encoding: canonical_fraction
  service_curve: {id: ext1b-generation-service, system_template: system_config_unified_template.yml, horizon: 1000}
  battery_mode: finite
  battery_capacity: "100"
grid:
  utilization_points: ["2/5"]
  tasksets_per_cell: 200
  base_seed: 971812602
  seed_mode: generation_dimensions
  taskset_index_start: 10000
rta: {methods: [CW_THETA_CW, LOC_THETA_LOC], timeout_seconds: 2, retry_timeout_seconds: 4, retry_policy: timeout_once, numerical_mode: EXACT_RATIONAL}
simulation:
  horizon: 400
  warmup: 0
  minimum_jobs_per_task: 2
  maximum_horizon: 400
  horizon_extension_policy: none
  deadline_miss_fail_fast: true
  timeout_seconds: 30
  trace_mode: semantic
  trace_on_failure: true
  retain_trace: true
  simulator_bin: ./build/rtsim/rtsim
execution:
  worker_count: 1
  checkpoint_every: 9
  output_root: /root/autodl-tmp/asap_block_v9_3_ext1b_b1_formal_r1
  taskset_store: /root/autodl-tmp/asap_block_v9_3_ext1b_b1_formal_r1_tasksets
  resume: false
  fail_fast_on_p0: true
  preserve_attempt_history: true
scenario:
  kind: BYPASS_STRESS
  subtype: B1
  structural_retry_limit: 16
  activation_policy: REPORT_STRUCTURAL_AND_RUNTIME
  priority_power_profile: HIGH_PRIORITY_HIGH_POWER
  affordable_prefix_length: 1
  deadline_ratio_min: "0"
  deadline_ratio_max: "1"
  nominal_energy_supply_ratios: ["4/5"]
  initial_energy_policy: STRUCTURAL_MIDPOINT
  release_pattern: SYNCHRONOUS
  harvest_phase_policy: PEAK_SYNTHETIC
  interpolation_rho: "3/4"
  timing_cells: []
statistics: {bootstrap_seed: 1605045777, bootstrap_resamples: 10000, top_m: 4}
plots: {}

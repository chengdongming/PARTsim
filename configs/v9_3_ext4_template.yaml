# Production template only; formal robustness levels remain unfrozen.
experiment_id: asap-block-v9.3-ext4-template
core: CORE-3
extension: EXT-4
platform: {cores: [4], task_count: [10]}
generation:
  deadline_mode: implicit
  constrained_deadline: {d_over_t_values: [], d_over_t_min: "0", d_over_t_max: "1", distribution: generator_uniform_integer}
  period_min: 40
  period_max: 200
  wcet_rounding: compensated
  utilization_tolerance: "0.01"
  min_task_util: "0.01"
  max_task_util: "0.8"
  priority_policy: RM
  power_mode: generator_default_heterogeneous
  generator_timeout_seconds: 120
energy:
  initial_energy_values: ["1"]
  simulation_initial_battery: "20"
  exact_rational_encoding: canonical_fraction
  service_curve: {id: configure-before-formal-run, system_template: system_config_unified_template.yml, horizon: 30000}
  battery_mode: finite
  battery_capacity: "100"
grid: {utilization_points: ["0.2"], tasksets_per_cell: 1, base_seed: 930640, seed_mode: generation_dimensions}
rta: {methods: [CW_THETA_CW, LOC_THETA_LOC], timeout_seconds: 10, retry_timeout_seconds: 20, retry_policy: timeout_once, numerical_mode: EXACT_RATIONAL}
simulation: {horizon: 1000, warmup: 0, minimum_jobs_per_task: 3, maximum_horizon: 2000, horizon_extension_policy: double, deadline_miss_fail_fast: true, timeout_seconds: 60, trace_mode: semantic, trace_on_failure: true, simulator_bin: ./build/rtsim/rtsim}
robustness:
  generator_family: UUNIFAST_DISCARD
  priority_policies: [RM]
  power_modes: [generator_default_heterogeneous]
  deadline_modes: [implicit, constrained]
  period_ranges: [{id: default_40_200, min: 40, max: 200}, {id: wide_80_400, min: 80, max: 400}]
  rta_methods: [CW_THETA_CW, LOC_THETA_LOC]
  run_simulation: true
  max_rta_analyses: 12
  max_simulations: 6
execution: {worker_count: 1, checkpoint_every: 1, output_root: artifacts/v9_3_ext4_template, taskset_store: artifacts/v9_3_ext4_taskset_store, resume: false, fail_fast_on_p0: true, preserve_attempt_history: true}
plots: {}

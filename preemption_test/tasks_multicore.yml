# =============================================
# 多核环境抢占测试任务集
# =============================================
# 测试场景：
# - 任务数超过CPU核心数（5个任务 vs 4个核心）
# - 高优先级任务到达时需要抢占
# =============================================

taskset:
  # ===========================================
  # 任务1: 低优先级任务（周期10ms）
  # ===========================================
  - name: task_low_priority_1
    iat: 10                      # 到达间隔10ms
    runtime: 8                   # 运行时间8ms
    deadline: 10                 # 截止时间10ms
    params: "period=10,wcet=8,arrival_offset=0,workload=bzip2"
    code:
      - fixed(8, bzip2)

  # ===========================================
  # 任务2: 低优先级任务（周期10ms）
  # ===========================================
  - name: task_low_priority_2
    iat: 10                      # 到达间隔10ms
    runtime: 8                   # 运行时间8ms
    deadline: 10                 # 截止时间10ms
    params: "period=10,wcet=8,arrival_offset=0,workload=bzip2"
    code:
      - fixed(8, bzip2)

  # ===========================================
  # 任务3: 低优先级任务（周期10ms）
  # ===========================================
  - name: task_low_priority_3
    iat: 10                      # 到达间隔10ms
    runtime: 8                   # 运行时间8ms
    deadline: 10                 # 截止时间10ms
    params: "period=10,wcet=8,arrival_offset=0,workload=bzip2"
    code:
      - fixed(8, bzip2)

  # ===========================================
  # 任务4: 低优先级任务（周期10ms）
  # ===========================================
  - name: task_low_priority_4
    iat: 10                      # 到达间隔10ms
    runtime: 8                   # 运行时间8ms
    deadline: 10                 # 截止时间10ms
    params: "period=10,wcet=8,arrival_offset=0,workload=bzip2"
    code:
      - fixed(8, bzip2)

  # ===========================================
  # 任务5: 高优先级任务（周期5ms）- 会触发抢占
  # ===========================================
  - name: task_high_priority
    iat: 5                       # 到达间隔5ms（更短=更高优先级）
    runtime: 2                   # 运行时间2ms
    deadline: 5                  # 截止时间5ms
    params: "period=5,wcet=2,arrival_offset=1,workload=bzip2"
    code:
      - fixed(2, bzip2)

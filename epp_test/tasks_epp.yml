# =============================================
# EPP调度器测试任务集
# =============================================
# 特点：
# 1. 不需要 suspend(0) - EPP是真正的抢占式调度器
# 2. 使用 fixed() 指令直接执行WCET时间
# 3. 高优先级任务可以在任意时刻抢占低优先级任务
# 4. 能量约束：能量不足时任务进入等待队列
# =============================================

taskset:
  # task_high: 最高优先级 - 周期500ms (周期越短优先级越高)
  - name: task_high
    iat: 500              # 任务到达间隔：500ms
    runtime: 250          # WCET: 250ms (固定执行时间)
    deadline: 500         # 绝对截止时间：500ms
    params: "period=500,wcet=250,workload=bzip2"
    code:
      - fixed(250, bzip2)  # ⭐ 直接执行250ms，不需要suspend

  # task_mid: 中优先级 - 周期1000ms
  - name: task_mid
    iat: 1000
    runtime: 400          # WCET: 400ms
    deadline: 1000
    params: "period=1000,wcet=400,workload=bzip2"
    code:
      - fixed(400, bzip2)  # ⭐ 可能被task_high抢占

  # task_low: 低优先级 - 周期2000ms
  - name: task_low
    iat: 2000
    runtime: 600          # WCET: 600ms
    deadline: 2000
    params: "period=2000,wcet=600,workload=bzip2"
    code:
      - fixed(600, bzip2)  # ⭐ 可能被task_high和task_mid抢占

  # task_background: 最低优先级 - 周期3000ms
  - name: task_background
    iat: 3000
    runtime: 800          # WCET: 800ms
    deadline: 3000
    params: "period=3000,wcet=800,workload=hash"
    code:
      - fixed(800, hash)   # ⭐ 背景任务，可能被所有高优先级任务抢占

# =============================================
# 能耗数据（8.1 GHz，简化功率模型）
# =============================================
#
# task_high:    2.0W × 0.25s = 0.50J
# task_mid:     2.0W × 0.40s = 0.80J
# task_low:     2.0W × 0.60s = 1.20J
# task_background: 1.8W × 0.80s = 1.44J
#
# 总能耗: 0.50 + 0.80 + 1.20 + 1.44 = 3.94J
#
# 初始能量 5.0J 可以支持所有任务级联调度 ✅
#
# =============================================

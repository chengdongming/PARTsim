analysis:
  numerical_mode: EXACT_RATIONAL
  retry_policy: timeout_once
  retry_timeout_seconds: 4.0
  timeout_seconds: 2.0
  variants:
  - CW_THETA_CW
  - LOC_THETA_LOC
  worker_count: 1
core: CORE-3
energy:
  battery_capacity: '100'
  battery_mode: finite
  exact_rational_encoding: canonical_fraction
  initial_energy_values:
  - '1'
  service_curve:
    horizon: 30000
    id: ext2-task-generation-reference-v1
    system_template: system_config_unified_template.yml
  simulation_initial_battery: '20'
execution:
  checkpoint_every: 1
  fail_fast_on_p0: true
  output_root: artifacts/v9_3_unified_rehearsal/ext2
  preserve_attempt_history: true
  resume: false
  taskset_store: artifacts/v9_3_unified_rehearsal/taskset_stores/ext2
  worker_count: 1
experiment_id: asap-block-v9.3-ext2-smoke
extension: EXT-2
generation:
  constrained_deadline:
    d_over_t_max: '1'
    d_over_t_min: '0'
    d_over_t_values: []
    distribution: generator_uniform_integer
  deadline_mode: implicit
  generator_timeout_seconds: 120
  max_task_util: 4/5
  min_task_util: 1/100
  period_max: 200
  period_min: 40
  power_mode: generator_default_heterogeneous
  priority_policy: RM
  utilization_tolerance: 1/100
  wcet_rounding: compensated
grid:
  base_seed: 930621
  seed_mode: generation_dimensions
  tasksets_per_cell: 1
  utilization_points:
  - 1/5
platform:
  cores:
  - 4
  task_count:
  - 10
plots: {}
real_trace:
  data_status: REAL_TRACE_DATA_UNAVAILABLE
  input_file: test/fixtures/v9_3_ext2_synthetic_trace.csv
  resampling:
    declared_interpolation: piecewise_constant
    policy: exact_subdivision
    target_interval_seconds: '60'
  scale: '1'
  schedulers:
  - gpfp_asap_block
  schema:
    duration_column: duration_seconds
    fixture_label: SYNTHETIC_TEST_FIXTURE
    missing_policy: reject
    preprocessing_version: SYNTHETIC_FIXTURE_V1
    quantity_kind: INSTANTANEOUS_POWER
    source_id: ext2-test-fixture
    timestamp_column: timestamp
    timestamp_format: iso8601
    trace_id: ext2-synthetic-smoke-v1
    unit: W
    value_column: power_w
  segment_selection:
    rule: FIRST_N_SAMPLES_PREDECLARED
    sample_count: 3
    start_sample: 0
  service_bound:
    applicable_horizon_intervals: 0
    enabled: false
rta:
  methods:
  - CW_THETA_CW
  - LOC_THETA_LOC
  numerical_mode: EXACT_RATIONAL
  retry_policy: timeout_once
  retry_timeout_seconds: 4
  timeout_seconds: 2
simulation:
  deadline_miss_fail_fast: true
  horizon: 300
  horizon_extension_policy: none
  maximum_horizon: 300
  minimum_jobs_per_task: 1
  simulator_bin: ./build/rtsim/rtsim
  timeout_seconds: 20
  trace_mode: semantic
  trace_on_failure: true
  warmup: 0

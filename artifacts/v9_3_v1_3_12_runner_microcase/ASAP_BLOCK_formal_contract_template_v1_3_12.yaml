analysis_contract:
  variants:
  - CW-D
  - LOC-D
  - CW-Theta^cw
  - LOC-Theta^cw
  - LOC-Theta^loc
  main_methods:
  - CW-Theta^cw
  - LOC-Theta^loc
  closure_search:
    w_scan: C_k..D_k inclusive pointwise
    h_scan: 0..w-A_k^Theta(w) inclusive
    q_scan: 1..A_k^Theta(w) inclusive
    forbid_jump_or_binary_search_without_theorem: true
  fixed_carry_in_corollary_required_for:
  - CW-D
  - LOC-D
  - LOC-Theta^cw
  certification_semantics:
    method_roles:
      CW-Theta^cw: MAIN_METHOD
      LOC-Theta^loc: MAIN_METHOD
      CW-D: AUXILIARY_ABLATION
      LOC-D: AUXILIARY_ABLATION
      LOC-Theta^cw: AUXILIARY_ABLATION
    taskset_proven_equivalence: analysis_certification_status == CERTIFIED_TASKSET
    pre_joint_success_task_status: PROVISIONAL_NOT_CERTIFIED
    loc_theta_cw:
      source_variant: CW-Theta^cw
      source_solver_status: COMPLETED
      source_certification_status: CERTIFIED_TASKSET
      fixed_carry_in_corollary_status: ACTIVE
      dependency_vector_check_status: VALID
      complete_compatible_vector_status: CERTIFIED_TASKSET
      invalid_dependency_formal_status: NOT_APPLICABLE
      valid_domain_no_candidate_status: INTERNAL_CONFORMANCE_FAILURE
      valid_domain_no_candidate_dominance_status: DOMINANCE_INVARIANT_VIOLATION
  task_failure_provenance:
    code_field: task_failure_reason_code
    detail_field: task_failure_detail
    raw_failure_reason_is_formal: false
    consumer_must_not_infer_status_from_detail: true
    unknown_raw_or_origin_policy: FAIL_CLOSED
    task_result_hash_binds_code_and_detail: true
    semantic_request_identity_excludes_code_and_detail: true
    exact_detail_by_code:
      NONE: null
      NO_CANDIDATE: closure exhausted through task deadline
      SOLVER_TIMEOUT: null
      NUMERIC_ERROR: numeric guard rejected analysis
      UPSTREAM_PREFIX_FAILURE: null
      DEPENDENCY_NOT_APPLICABLE: null
      DOMINANCE_INVARIANT_VIOLATION: local result violated frozen carry-in dominance
      UNKNOWN_CORE_STATUS: unrecognized core solver status
      INTERNAL_CONFORMANCE_FAILURE: internal analyzer conformance failure
    status_code_matrix:
      CANDIDATE_FOUND:
      - NONE
      - DOMINANCE_INVARIANT_VIOLATION
      NO_CANDIDATE:
      - NO_CANDIDATE
      - DOMINANCE_INVARIANT_VIOLATION
      TIMEOUT:
      - SOLVER_TIMEOUT
      NUMERIC_ERROR:
      - NUMERIC_ERROR
      NOT_EVALUATED_AFTER_PREFIX_FAILURE:
      - UPSTREAM_PREFIX_FAILURE
      NOT_APPLICABLE_DEPENDENCY:
      - DEPENDENCY_NOT_APPLICABLE
      INTERNAL_CONFORMANCE_FAILURE:
      - UNKNOWN_CORE_STATUS
      - INTERNAL_CONFORMANCE_FAILURE

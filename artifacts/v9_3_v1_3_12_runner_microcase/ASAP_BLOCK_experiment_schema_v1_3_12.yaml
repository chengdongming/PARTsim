    - approved_audit_build_identity_hash
    - human_label
    - parent_request_id
    - audit_subject_request_id
    conditional_rules:
    - rule_id: GENERATION_PAYLOAD_FIELDS
      if:
        field: request_type
        equals: GENERATION
      then_required:
      - base_generation_cell_id
      - seed_scope_id
      - derived_seed
      - generator_contract_hash
    - rule_id: TRANSFORMATION_PAYLOAD_FIELDS
      if:
        field: request_type
        equals: TRANSFORMATION
      then_required:
      - base_generation_request_id
      - taskset_request_id
      - paired_family_id
      - transformation_id
      - transformation_type
      - transformation_parameter_canonical
    - rule_id: RELEASE_TRACE_GENERATION_PAYLOAD_FIELDS
      if:
        field: request_type
        equals: RELEASE_TRACE_GENERATION
      then_required:
      - taskset_request_id
      - scenario_id
      - seed_scope_id
      - derived_seed
      - stream_label
      - stream_index
      - trace_generator_contract_hash
    - rule_id: HARVEST_TRACE_GENERATION_PAYLOAD_FIELDS
      if:
        field: request_type
        equals: HARVEST_TRACE_GENERATION
      then_required:
      - scenario_id
      - seed_scope_id
      - derived_seed
      - stream_label
      - stream_index
      - trace_generator_contract_hash
    - rule_id: ANALYSIS_PAYLOAD_FIELDS
      if:
        field: request_type
        equals: ANALYSIS
      then_required:
      - taskset_request_id
      - analysis_variant_or_scenario
      - analysis_config_hash
      - approved_rta_build_identity_hash
    - rule_id: SIMULATION_PAYLOAD_FIELDS
      if:
        field: request_type
        equals: SIMULATION
      then_required:
      - taskset_request_id
      - release_trace_request_id
      - harvest_trace_request_id
      - analysis_variant_or_scenario
      - simulation_contract_hash
      - approved_simulator_build_identity_hash
      - approved_scheduler_build_identity_hash
    - rule_id: SERVICE_CHECK_PAYLOAD_FIELDS
      if:
        field: request_type
        equals: SERVICE_CHECK
      then_required:
      - simulation_request_id
      - analysis_request_id
      - service_curve_check_config_hash
      - approved_audit_build_identity_hash
    - rule_id: E0_CHECK_PAYLOAD_FIELDS
      if:
        field: request_type

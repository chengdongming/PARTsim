    - source_analysis_run_id
    - carry_in_vector_hash
    - carry_in_source_variant
    - carry_in_source_certification_status
    - fixed_carry_in_corollary_status
    - dependency_vector_check_status
    - dependency_input_failure_mask
    - closing_w
    optional_diagnostic:
    - witness_h
    - critical_q
    - minimum_energy_slack
    - processor_delay_Dp
    foreign_keys:
      analysis_run_id: per_taskset_results.csv.analysis_run_id
      taskset_id: tasksets.csv.taskset_id
    conditional_rules:
    - if:
        field: task_solver_status
        equals: CANDIDATE_FOUND
      then_required:
      - candidate_response_time
      - closing_w
      else_null:
      - candidate_response_time
      - closing_w
      - witness_h
      - critical_q
    - rule_id: TASK_FAILURE_DETAIL_REQUIRED_BY_CODE
      if:
        field: task_failure_reason_code
        in:
        - NO_CANDIDATE
        - NUMERIC_ERROR
        - DOMINANCE_INVARIANT_VIOLATION
        - UNKNOWN_CORE_STATUS
        - INTERNAL_CONFORMANCE_FAILURE
      then_required:
      - task_failure_detail
      else_null:
      - task_failure_detail
    - if:
        field: energy_numeric_mode
        equals: FIXED_POINT_DIRECTED
      then_required:
      - P_hat_i_scaled
      - P_hat_i_rounding
      rule_id: FIXED_POINT_TASK_POWER_FIELDS
    - if:
        field: energy_numeric_mode
        equals: EXACT_RATIONAL
      then_null:
      - P_hat_i_scaled
      - P_hat_i_rounding
      rule_id: EXACT_TASK_POWER_FIELDS_NULL
    - if:
        field: variant
        equals: LOC-Theta^cw
      then_required:
      - source_analysis_run_id
      - carry_in_vector_hash
      - carry_in_source_variant
      - carry_in_source_certification_status
      - fixed_carry_in_corollary_status
      - dependency_vector_check_status
      - dependency_input_failure_mask
      rule_id: LOC_THETA_CW_REQUIRES_FROZEN_SOURCE
    constraints:
    - CERTIFIED_requires_CANDIDATE_FOUND
    - TASK_FAILURE_REASON_STATUS_MATRIX
    - TASK_FAILURE_DETAIL_EXACT_BY_CODE
    - RAW_FAILURE_REASON_FORBIDDEN_FROM_CANONICAL_OUTPUT
    unique_constraints:
    - - analysis_run_id
      - taskset_id
      - task_id
    composite_foreign_keys:
    - local:
      - analysis_run_id
      - taskset_id
      references:
        table: per_taskset_results.csv
        columns:
        - analysis_run_id
        - taskset_id
    - local:
      - taskset_id
      - task_id
      references:
        table: task_definitions.csv
        columns:
        - taskset_id
        - task_id

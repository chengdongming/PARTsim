schema_metadata:
  name: ASAP_BLOCK_experiment_schema
  version: 1.3.12
  authority: machine_readable_normative_index
  markdown_companion: ASAP_BLOCK_实验配置与验收规范_v1_3_12_最终机器合同与验证闭合版.md
  data_dictionary_file: ASAP_BLOCK_data_dictionary_v1_3_12.yaml
  canonical_serialization_file: ASAP_BLOCK_canonical_serialization_v1_3_12.yaml
  artifact_validator_file: ASAP_BLOCK_artifact_validator_v1_3_12.py
  result_validator_file: ASAP_BLOCK_result_validator_v1_3_12.py
  rule: This schema defines table fields, classifications, keys, structured conditional rules and lineage. The data dictionary
    defines types/units. Artifact, acceptance-report, and result validators are the normative executors for their respective
    scopes.
  field_classes:
  - required
  - conditionally_required
  - optional_diagnostic
  machine_interface_manifest_file: ASAP_BLOCK_machine_interface_manifest_v1_3_12.yaml
  validator_contract: all executable runtime hard rules are implemented by ASAP_BLOCK_result_validator_v1_3_12.py; CORE-0 gate
    evidence is replayed by ASAP_BLOCK_acceptance_report_validator_v1_3_12.py; string constraints are labels only unless listed
    in executable_rule_ids
  description: Normative executable schema for ASAP-BLOCK experiment contracts and result lineage; v1.3.12 closes request payload,
    trace planning, transformed-taskset lineage, output bundles, and soundness derivation.
  acceptance_validator_file: ASAP_BLOCK_acceptance_report_validator_v1_3_12.py
  per_task_results_template_file: ASAP_BLOCK_per_task_results_template_v1_3_12.csv

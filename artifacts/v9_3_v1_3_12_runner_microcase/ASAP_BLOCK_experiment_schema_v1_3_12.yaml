state_machines:
  run_execution_attempt:
    initial_event: STARTED
    nonterminal_events:
    - HEARTBEAT
    terminal_events:
    - FINISHED
    - TIMEOUT
    - OUT_OF_MEMORY
    - INTERRUPTED
    - INFRASTRUCTURE_FAILURE
    - NOT_RUN_DEPENDENCY
    - CANCELLED
    retryable_terminal_events:
    - OUT_OF_MEMORY
    - INTERRUPTED
    - INFRASTRUCTURE_FAILURE
    nonretryable_terminal_events:
    - FINISHED
    - TIMEOUT
    - NOT_RUN_DEPENDENCY
    - CANCELLED
    allowed_transitions:
      __BEGIN__:
      - STARTED
      STARTED:
      - HEARTBEAT
      - FINISHED
      - TIMEOUT
      - OUT_OF_MEMORY
      - INTERRUPTED
      - INFRASTRUCTURE_FAILURE
      - NOT_RUN_DEPENDENCY
      - CANCELLED
      HEARTBEAT:
      - HEARTBEAT
      - FINISHED
      - TIMEOUT
      - OUT_OF_MEMORY
      - INTERRUPTED
      - INFRASTRUCTURE_FAILURE
      - NOT_RUN_DEPENDENCY
      - CANCELLED
      FINISHED: []
      TIMEOUT: []
      OUT_OF_MEMORY: []
      INTERRUPTED: []
      INFRASTRUCTURE_FAILURE: []
      NOT_RUN_DEPENDENCY: []
      CANCELLED: []
    rules:
    - attempt_index_contiguous_from_zero
    - execution_event_index_contiguous_from_zero
    - event_time_monotone
    - terminal_is_last
    - no_events_after_terminal
    - retry_only_after_retryable_terminal
    - retry_points_to_immediately_previous_attempt
    - attempt_count_le_frozen_max_attempts
    - NOT_RUN_DEPENDENCY_requires_failed_dependency
    - FINISHED_output_matches_plan_and_request_outputs

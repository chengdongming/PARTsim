  run_plan_dependencies.csv:
    primary_key:
    - request_id
    - dependency_request_id
    - dependency_role
    canonical_column_order:
    - request_id
    - dependency_request_id
    - dependency_role
    required:
    - request_id
    - dependency_request_id
    - dependency_role
    conditionally_required: []
    optional_diagnostic: []
    foreign_keys:
      request_id: run_plan_definition.csv.request_id
      dependency_request_id: run_plan_definition.csv.request_id
    constraints:
    - acyclic_dependency_DAG
    - generation_and_parent_dependencies_preplanned_by_request_id
  run_execution_log.csv:
    primary_key:
    - request_id
    - attempt_index
    - execution_event_index
    canonical_column_order:
    - request_id
    - attempt_index
    - execution_event_index
    - build_identity_hash
    - execution_status
    - event_time_utc
    - run_phase
    - plan_context_hash
    - max_attempts
    - actual_output_id
    - actual_output_hash
    - infrastructure_failure_class
    - infrastructure_failure_code
    - formal_contract_hash
    - actual_output_type
    - retry_of_attempt_index
    - host_id
    - execution_message
    required:
    - request_id
    - attempt_index
    - execution_event_index
    - build_identity_hash
    - execution_status
    - event_time_utc
    - run_phase
    - plan_context_hash
    - max_attempts
    conditionally_required:
    - actual_output_id
    - actual_output_hash
    - infrastructure_failure_class
    - infrastructure_failure_code
    - formal_contract_hash
    - actual_output_type
    optional_diagnostic:
    - retry_of_attempt_index
    - host_id
    - execution_message
    foreign_keys:
      request_id: run_plan_definition.csv.request_id
    conditional_rules:
    - if:
        field: execution_status
        equals: FINISHED
      then_required:
      - actual_output_id
      - actual_output_hash
    - if:
        field: execution_status
        equals: INFRASTRUCTURE_FAILURE
      then_required:
      - infrastructure_failure_class
      - infrastructure_failure_code
    - if:
        field: run_phase
        in:
        - CORE0B
        - FORMAL
      then_required:
      - formal_contract_hash
      rule_id: FORMAL_PHASE_REQUIRES_FINAL_CONTRACT
    - if:
        field: run_phase
        in:
        - CORE0A
        - PILOT
      then_null:
      - formal_contract_hash
      rule_id: PREFORMAL_PHASE_FORBIDS_RETROACTIVE_FINAL_CONTRACT
    - if:
        field: execution_status
        equals: FINISHED

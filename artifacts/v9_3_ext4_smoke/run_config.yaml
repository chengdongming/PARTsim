  - implicit
  - constrained
  generator_family: UUNIFAST_DISCARD
  max_rta_analyses: 12
  max_simulations: 6
  period_ranges:
  - id: default_40_200
    max: 200
    min: 40
  - id: wide_80_400
    max: 400

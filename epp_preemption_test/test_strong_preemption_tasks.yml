# =============================================
# EPP 抢占性验证测试 - 强抢占场景
# =============================================
# 测试目标：验证高优先级任务到达时能否抢占低优先级任务
# =============================================

taskset:
  # 任务1: 低优先级（周��1500ms，优先级最低）
  - name: task_low
    iat: 1500
    runtime: 200
    deadline: 1500
    params: "period=1500,wcet=200,arrival_offset=0,workload=idle"
    code:
      - fixed(200, idle)

  # 任务2: 中等优先级（周期1000ms）
  - name: task_mid
    iat: 1000
    runtime: 200
    deadline: 1000
    params: "period=1000,wcet=200,arrival_offset=20,workload=hash"
    code:
      - fixed(200, hash)

  # 任务3: 高优先级（周期500ms），最晚到达
  - name: task_high
    iat: 500
    runtime: 150
    deadline: 500
    params: "period=500,wcet=150,arrival_offset=30,workload=bzip2"
    code:
      - fixed(150, bzip2)

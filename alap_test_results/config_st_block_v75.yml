cpu_islands:
  - name: test_cpus
    numcpus: 3
    kernel:
      scheduler: gpfp_st_block
      task_placement: global
    volts: [0.92]
    freqs: [8100]
    base_freq: 8100
    power_model: test_model
    speed_model: test_model

energy_management:
  initial_energy: 0.005
  max_energy: 0.15
  day_of_year: 187
  time_of_day_ms: 43200000
  use_real_solar_data: false
  solar_data_file: ""
  pv_efficiency: 0.18
  pv_area_m2: 0.002
  periodic_collection_interval_ms: 1
  enable_energy_recovery: true
  max_recovery_wait_time_ms: 10000
  base_harvesting_rate: 0.008

  scheduler_energy_model:
    base_power: 0.5
    workload_coefficients:
      bzip2: 1.0
      hash: 1.0
      encrypt: 1.0
      decrypt: 1.0
      control: 0.1
      idle: 0.1
    frequency_power_ratios:
      - 8100: 1.0

power_models:
  - name: test_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
      - workload: bzip2
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 1.0
      - workload: hash
        power_params: [1, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 1.0
      - workload: control
        power_params: [0.5, 0, 0, 0]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.5

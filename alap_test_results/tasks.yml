# =============================================
# 对抗性测试任务集 (U = 3.4 / 4核 = 0.85)
# =============================================
taskset:
  # 1. 能量刺客 (优先级1，极高耗电) - U = 0.4
  # 用来触发唤醒时的能量危机
  - name: Task_Assassin_Hungry
    iat: 50
    runtime: 20
    deadline: 50
    params: "period=50,wcet=20,arrival_offset=0,workload=encrypt"
    code:
      - fixed(20, encrypt)

  # 2. 幸存者 (优先级2，极低耗电) - U = 0.4
  # 用来验证 NonBlock 是否能贪心填补
  - name: Task_Survivor_Eco
    iat: 60
    runtime: 24
    deadline: 60
    params: "period=60,wcet=24,arrival_offset=0,workload=control"
    code:
      - fixed(24, control)

  # 3. 中坚力量 A - U = 0.5
  - name: Task_Mid_A
    iat: 100
    runtime: 50
    deadline: 100
    params: "period=100,wcet=50,arrival_offset=0,workload=hash"
    code:
      - fixed(50, hash)

  # 4. 中坚力量 B - U = 0.6
  - name: Task_Mid_B
    iat: 120
    runtime: 72
    deadline: 120
    params: "period=120,wcet=72,arrival_offset=0,workload=bzip2"
    code:
      - fixed(72, bzip2)

  # 5. 底层苦工 A - U = 0.6
  - name: Task_Low_A
    iat: 200
    runtime: 120
    deadline: 200
    params: "period=200,wcet=120,arrival_offset=0,workload=hash"
    code:
      - fixed(120, hash)

  # 6. 底层苦工 B (兜底任务，极低耗电) - U = 0.9
  - name: Task_Low_B
    iat: 500
    runtime: 450
    deadline: 500
    params: "period=500,wcet=450,arrival_offset=0,workload=control"
    code:
      - fixed(450, control)

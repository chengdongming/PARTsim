# 演示任务集 - 展示Slack唤醒机制
# 任务参数设计：让任务在执行中途因能量不足被挂起，然后在Slack=0时唤醒
taskset:
  - name: Task_High
    iat: 50
    runtime: 8
    deadline: 50
    params: "period=50,wcet=8,workload=bzip2"
    code:
      - fixed(8, bzip2)

  - name: Task_Med
    iat: 80
    runtime: 10
    deadline: 80
    params: "period=80,wcet=10,workload=hash"
    code:
      - fixed(10, hash)

  - name: Task_Low
    iat: 100
    runtime: 12
    deadline: 100
    params: "period=100,wcet=12,workload=encrypt"
    code:
      - fixed(12, encrypt)

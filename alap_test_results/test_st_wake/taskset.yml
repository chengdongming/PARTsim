# 测试任务集 - 高负载任务，会触发能量不足
taskset:
  - name: Task_High
    iat: 50
    runtime: 10
    deadline: 50
    params: "period=50,wcet=10,workload=bzip2"
    code:
      - fixed(10, bzip2)

  - name: Task_Med
    iat: 100
    runtime: 15
    deadline: 100
    params: "period=100,wcet=15,workload=hash"
    code:
      - fixed(15, hash)

  - name: Task_Low
    iat: 200
    runtime: 20
    deadline: 200
    params: "period=200,wcet=20,workload=encrypt"
    code:
      - fixed(20, encrypt)

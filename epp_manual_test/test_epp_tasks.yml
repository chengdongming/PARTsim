# =============================================
# EPP 测试任务集 - 简化版（便于手动模拟）
# =============================================
# 设计原则：
# 1. 只有3个任务，便于手动跟踪
# 2. 使用RM优先级（周期短=优先级高）
# 3. 能量消耗易于计算
# =============================================

# ---------------------------------------------
# 任务集定义
# ---------------------------------------------
taskset:
  # ===========================================
  # 任务1: 高优先级（周期最短）
  # ===========================================
  - name: task_high
    iat: 500                             # 任务周期/到达间隔 (ms)
    runtime: 200                         # WCET: 最坏执行时间 (ms)
    deadline: 500                        # 绝对截止时间 (ms)
    params: "period=500,wcet=200,arrival_offset=0,workload=bzip2"
    code:
      - fixed(200, bzip2)                # 固定执行200ms，bzip2工作负载

  # ===========================================
  # 任务2: 中等优先级
  # ===========================================
  - name: task_mid
    iat: 1000                            # 任务周期/到达间隔 (ms)
    runtime: 300                         # WCET: 最坏执行时间 (ms)
    deadline: 1000                       # 绝对截止时间 (ms)
    params: "period=1000,wcet=300,arrival_offset=0,workload=bzip2"
    code:
      - fixed(300, bzip2)                # 固定执行300ms，bzip2工作负载

  # ===========================================
  # 任务3: 低优先级（周期最长）
  # ===========================================
  - name: task_low
    iat: 1500                            # 任务周期/到达间隔 (ms)
    runtime: 400                         # WCET: 最坏执行时间 (ms)
    deadline: 1500                       # 绝对截止时间 (ms)
    params: "period=1500,wcet=400,arrival_offset=0,workload=hash"
    code:
      - fixed(400, hash)                 # 固定执行400ms，hash工作负载

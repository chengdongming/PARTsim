# =============================================
# EFPP测试3任务集：优先级反转场景
# =============================================
# 目的：在能量不足时，EFPP会调度低优先级任务，体现弹性调度特性
# =============================================

taskset:
  # task_high: 最高优先级 - 周期400ms
  # 能量需求: 100ms × 1.0W × 2.0 = 0.20J ⭐ 提高能量系数
  - name: task_high
    iat: 400              # 任务到达间隔：400ms
    runtime: 100          # WCET: 100ms
    deadline: 400         # 绝对截止时间：400ms
    params: "period=400,wcet=100,workload=bzip2,energy_coefficient=2.0"
    code:
      - fixed(100, bzip2)

  # task_mid: 中优先级 - 周期600ms
  # 能量需求: 100ms × 1.0W × 1.2 = 0.12J
  - name: task_mid
    iat: 600
    runtime: 100          # WCET: 100ms（降低）
    deadline: 600
    params: "period=600,wcet=100,workload=bzip2"
    code:
      - fixed(100, bzip2)

  # task_low: 低优先级 - 周期800ms
  # 能量需求: 25ms × 1.0W × 1.2 = 0.03J ✅ 初始能量0.08J，够执行task_low
  - name: task_low
    iat: 800
    runtime: 25           # WCET: 25ms（降低）
    deadline: 800
    params: "period=800,wcet=25,workload=bzip2"
    code:
      - fixed(25, bzip2)

# =============================================
# 预期行为（EFPP vs EPP）：
# =============================================
#
# 场景：初始能量0.12J，无太阳能收集
#
# EPP行为（刚性优先级）：
#   T=0ms: 检查task_high (需要0.12J)
#          判断: 0.12J - 0.12J = 0J ✅ 刚好够
#          预扣减: 0.12J，剩余0J
#          调度: task_high
#          级联检查task_mid (需要0.18J)
#          判断: 0J - 0.18J < 0 ❌
#          ⛔ 立即停止
#   T=0-100ms: task_high执行
#   T=100ms: task_high完成
#   结果: 完成1个任务（task_high）
#
# EFPP行为（弹性优先级）：
#   T=0ms: 检查task_high (需要0.12J)
#          判断: 0.12J - 0.12J = 0J ✅ 刚好够
#          预扣减: 0.12J，剩余0J
#          调度: task_high
#          级联检查task_mid (需要0.18J)
#          判断: 0J - 0.18J < 0 ❌
#          ⭐ 继续检查下一个任务（不停止）
#          级联检查task_low (需要0.06J)
#          判断: 0J - 0.06J < 0 ❌
#   T=0-100ms: task_high执行
#   T=100ms: task_high完成
#   结果: 完成1个任务（task_high）
#
# ⚠️ 修正：需要调整参数让task_high能量不足才能看到EFPP的弹性
# =============================================

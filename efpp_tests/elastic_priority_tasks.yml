# =============================================
# EFPP弹性优先级测试 - 任务集
# =============================================
# 目的：展示EFPP的弹性调度特性
#       - 当高优先级任务能量不足时，EFPP会调度低优先级任务
#       - 体现"弹性优先级"特性
# =============================================

taskset:
  # =============================================
  # task_high: 最高优先级（周期最短）
  # =============================================
  # 优先级: 400（RM: 周期越短优先级越高）
  # WCET: 200ms
  # 能量需求: 200ms × ~40W × 1.2 ≈ 0.10J
  # 初始能量 0.05J ❌ 能量不足
  # =============================================
  - name: task_high
    iat: 400              # 任务到达间隔：400ms
    runtime: 200          # WCET: 200ms
    deadline: 400         # 绝对截止时间：400ms
    params: "period=400,wcet=200,workload=bzip2,energy_coefficient=1.2"
    code:
      - fixed(200, bzip2) # 抢占式执行200ms

  # =============================================
  # task_mid: 中优先级
  # =============================================
  # 优先级: 600
  # WCET: 150ms
  # 能量需求: 150ms × ~40W × 1.2 ≈ 0.075J
  # 初始能量 0.05J ❌ 能量不足
  # =============================================
  - name: task_mid
    iat: 600
    runtime: 150          # WCET: 150ms
    deadline: 600
    params: "period=600,wcet=150,workload=bzip2"
    code:
      - fixed(150, bzip2)

  # =============================================
  # task_low: 低优先级（周期最长）
  # =============================================
  # 优先级: 800（RM: 周期越长优先级越低）
  # WCET: 50ms
  # 能量需求: 50ms × ~40W × 1.2 ≈ 0.025J
  # 初始能量 0.05J ✅ 能量充足
  # =============================================
  # ⭐ EFPP弹性特性：
  #    - task_high和task_mid能量不足
  #    - EFPP继续检查task_low
  #    - task_low能量充足，先被调度
  # =============================================
  - name: task_low
    iat: 800
    runtime: 50           # WCET: 50ms
    deadline: 800
    params: "period=800,wcet=50,workload=bzip2"
    code:
      - fixed(50, bzip2)

# =============================================
# 预期行为（EFPP弹性策略）：
# =============================================
#
# T=0ms:
#   - 所有任务同时到达
#   - EFPP按RM优先级顺序检查：task_high → task_mid → task_low
#   - task_high能量判断: 0.05J + 0J(预测) - 0.10J < 0 ❌ 跳过
#   - task_mid能量判断: 0.05J + 0J - 0.075J < 0 ❌ 跳过
#   - task_low能量判断: 0.05J + 0J - 0.025J > 0 ✅ 调度
#   - ⭐ 低优先级任务task_low先被调度！
#
# T=0-50ms:
#   - task_low执行
#
# T=50ms:
#   - task_low完成
#   - 能量恢复事件触发（所有任务能量不足）
#   - 但0点无太阳能，能量无法恢复
#   - task_high和task_mid等待能量
#
# T=400ms:
#   - task_high第2个实例到达
#   - 能量仍不足，deadline miss
#
# =============================================

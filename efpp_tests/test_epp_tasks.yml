# =============================================
# EPP测试任务集 - 0h/12h测试用
# =============================================
# 仿真时长：1500ms
# 任务数量：3个（高、中、低优先级）
# =============================================

taskset:
  # ===========================================
  # 高优先级任务：周期500ms，WCET 100ms
  # ===========================================
  - name: task_high
    iat: 500                        # 任务到达间隔 / 周期 (ms)
    runtime: 100                    # WCET: 最坏执行时间 (ms)
    deadline: 500                   # 绝对截止时间 (ms)
    params: "period=500,wcet=100,arrival_offset=0,workload=bzip2"
    code:
      - fixed(100, bzip2)           # 固定执行100ms，bzip2工作负载

  # ===========================================
  # 中优先级任务：周期1000ms，WCET 200ms
  # ===========================================
  - name: task_mid
    iat: 1000
    runtime: 200
    deadline: 1000
    params: "period=1000,wcet=200,arrival_offset=0,workload=bzip2"
    code:
      - fixed(200, bzip2)

  # ===========================================
  # 低优先级任务：周期2000ms，WCET 300ms
  # ===========================================
  - name: task_low
    iat: 2000
    runtime: 300
    deadline: 2000
    params: "period=2000,wcet=300,arrival_offset=0,workload=hash"
    code:
      - fixed(300, hash)

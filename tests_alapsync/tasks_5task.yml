# =============================================
# ALAP-Sync测试任务集 - 五任务版本
# =============================================

taskset:
  # 任务1: 高优先级短周期任务
  - name: task_high_p1
    iat: 200                    # 周期 200ms
    runtime: 80                 # WCET 80ms
    deadline: 200               # 截止期 200ms
    params: "period=200,wcet=80,arrival_offset=0,workload=bzip2"
    code:
      - fixed(80, bzip2)

  # 任务2: 高优先级任务
  - name: task_high_p2
    iat: 300
    runtime: 100
    deadline: 300
    params: "period=300,wcet=100,arrival_offset=0,workload=hash"
    code:
      - fixed(100, hash)

  # 任务3: 中等优先级任务
  - name: task_mid
    iat: 500
    runtime: 150
    deadline: 500
    params: "period=500,wcet=150,arrival_offset=0,workload=bzip2"
    code:
      - fixed(150, bzip2)

  # 任务4: 低优先级任务
  - name: task_low_p1
    iat: 800
    runtime: 200
    deadline: 800
    params: "period=800,wcet=200,arrival_offset=0,workload=hash"
    code:
      - fixed(200, hash)

  # 任务5: 最低优先级长周期任务
  - name: task_low_p2
    iat: 1000
    runtime: 250
    deadline: 1000
    params: "period=1000,wcet=250,arrival_offset=0,workload=control"
    code:
      - fixed(250, control)

# =============================================
# 能量不足中断测试任务集
# =============================================
# 测试场景：
# - 任务数: 2个任务
# - 初始能量: 非常低（0.0015J）
# - 目的: 测试运行时能量不足时的主动中断功能
# =============================================

taskset:
  # ===========================================
  # 任务1: 长时间运行的高能耗任务
  # ===========================================
  - name: task_high_energy_1
    iat: 20                      # 到达间隔20ms
    runtime: 10                  # 运行时间10ms
    deadline: 20                 # 截止时间20ms
    params: "period=20,wcet=10,arrival_offset=0,workload=bzip2"
    code:
      - fixed(10, bzip2)

  # ===========================================
  # 任务2: 长时间运行的高能耗任务
  # ===========================================
  - name: task_high_energy_2
    iat: 20                      # 到达间隔20ms
    runtime: 10                  # 运行时间10ms
    deadline: 20                 # 截止时间20ms
    params: "period=20,wcet=10,arrival_offset=0,workload=bzip2"
    code:
      - fixed(10, bzip2)

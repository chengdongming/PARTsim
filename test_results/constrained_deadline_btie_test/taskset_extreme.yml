# 极限压力约束截止期任务集 (D < T)
# T1: period=30, deadline=22 (0.73*30), wcet=18
# T2: period=50, deadline=35 (0.70*50), wcet=28
# T3: period=70, deadline=45 (0.64*70), wcet=35
# T4: period=90, deadline=60 (0.67*90), wcet=40
# 总利用率 = 18/30 + 28/50 + 35/70 + 40/90 = 0.6 + 0.56 + 0.5 + 0.44 = 2.1
# 这个利用率在4个CPU系统中理论上可调度，但约束截止期可能导致某些算法失败

taskset:
  - name: T1
    iat: 30
    runtime: 18
    deadline: 22
    params: "period=30,wcet=18,arrival_offset=0,workload=bzip2"
    code:
      - fixed(18, bzip2)

  - name: T2
    iat: 50
    runtime: 28
    deadline: 35
    params: "period=50,wcet=28,arrival_offset=0,workload=hash"
    code:
      - fixed(28, hash)

  - name: T3
    iat: 70
    runtime: 35
    deadline: 45
    params: "period=70,wcet=35,arrival_offset=0,workload=encrypt"
    code:
      - fixed(35, encrypt)

  - name: T4
    iat: 90
    runtime: 40
    deadline: 60
    params: "period=90,wcet=40,arrival_offset=0,workload=bzip2"
    code:
      - fixed(40, bzip2)

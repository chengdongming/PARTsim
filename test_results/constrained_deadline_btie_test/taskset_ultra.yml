# 超高负载约束截止期任务集 (D < T)
# 目标：利用率接近4.0，测试系统极限
# T1: period=25, deadline=18 (0.72*25), wcet=20
# T2: period=35, deadline=25 (0.71*35), wcet=28
# T3: period=45, deadline=32 (0.71*45), wcet=35
# T4: period=55, deadline=38 (0.69*55), wcet=40
# T5: period=65, deadline=45 (0.69*65), wcet=45
# 总利用率 = 20/25 + 28/35 + 35/45 + 40/55 + 45/65 = 0.8 + 0.8 + 0.78 + 0.73 + 0.69 = 3.8
# 这个利用率在4个CPU系统中接近极限，应该能看到算法差异

taskset:
  - name: T1
    iat: 25
    runtime: 20
    deadline: 18
    params: "period=25,wcet=20,arrival_offset=0,workload=bzip2"
    code:
      - fixed(20, bzip2)

  - name: T2
    iat: 35
    runtime: 28
    deadline: 25
    params: "period=35,wcet=28,arrival_offset=0,workload=hash"
    code:
      - fixed(28, hash)

  - name: T3
    iat: 45
    runtime: 35
    deadline: 32
    params: "period=45,wcet=35,arrival_offset=0,workload=encrypt"
    code:
      - fixed(35, encrypt)

  - name: T4
    iat: 55
    runtime: 40
    deadline: 38
    params: "period=55,wcet=40,arrival_offset=0,workload=bzip2"
    code:
      - fixed(40, bzip2)

  - name: T5
    iat: 65
    runtime: 45
    deadline: 45
    params: "period=65,wcet=45,arrival_offset=0,workload=hash"
    code:
      - fixed(45, hash)

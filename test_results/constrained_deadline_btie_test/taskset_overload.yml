# 超载约束截止期任务集 (D < T)
# 目标：利用率超过4.0，系统必然无法完成所有任务
# T1: period=20, deadline=14 (0.70*20), wcet=18
# T2: period=30, deadline=21 (0.70*30), wcet=26
# T3: period=40, deadline=28 (0.70*40), wcet=34
# T4: period=50, deadline=35 (0.70*50), wcet=42
# T5: period=60, deadline=42 (0.70*60), wcet=48
# 总利用率 = 18/20 + 26/30 + 34/40 + 42/50 + 48/60 = 0.9 + 0.87 + 0.85 + 0.84 + 0.8 = 4.26
# 利用率超过4.0，系统必然过载，应该能看到算法差异

taskset:
  - name: T1
    iat: 20
    runtime: 18
    deadline: 14
    params: "period=20,wcet=18,arrival_offset=0,workload=bzip2"
    code:
      - fixed(18, bzip2)

  - name: T2
    iat: 30
    runtime: 26
    deadline: 21
    params: "period=30,wcet=26,arrival_offset=0,workload=hash"
    code:
      - fixed(26, hash)

  - name: T3
    iat: 40
    runtime: 34
    deadline: 28
    params: "period=40,wcet=34,arrival_offset=0,workload=encrypt"
    code:
      - fixed(34, encrypt)

  - name: T4
    iat: 50
    runtime: 42
    deadline: 35
    params: "period=50,wcet=42,arrival_offset=0,workload=bzip2"
    code:
      - fixed(42, bzip2)

  - name: T5
    iat: 60
    runtime: 48
    deadline: 42
    params: "period=60,wcet=48,arrival_offset=0,workload=hash"
    code:
      - fixed(48, hash)

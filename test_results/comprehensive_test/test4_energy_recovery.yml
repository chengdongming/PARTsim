# 测试4：能量收集和恢复
# 目标：验证能量收集后任务是否能恢复执行
cpu_islands:
  - name: energy_aware_cpus
    numcpus: 2
    kernel:
      scheduler: gpfp_tie
      task_placement: global
    volts: [1.00]
    freqs: [8100]
    base_freq: 8100
    power_model: energy_aware_model
    speed_model: energy_aware_model

energy_management:
  initial_energy: 0.001         # 1mJ，只够任务执行约1ms
  max_energy: 1000.0
  day_of_year: 182
  time_of_day_ms: 0
  use_real_solar_data: false
  pv_efficiency: 0.22
  pv_area_m2: 1.0
  periodic_collection_interval_ms: 1
  enable_energy_recovery: true
  max_recovery_wait_time_ms: 10000
  # 模拟每ms收集0.2mJ能量
  periodic_collection_amount: 0.0002
  scheduler_energy_model:
    base_power: 1.0
    workload_coefficients:
      encrypt: 1.0
    frequency_power_ratios:
      8100: 0.93

power_models:
  - name: energy_aware_model
    type: balsini_pannocchi
    params:
      - workload: encrypt
        power_params: [0.00775587, 33.376, 1.54585, 9.53439e-10]
        speed_params: [0.0256054, 2.9809e+6, 0.602631, 8.13712e+9]
        energy_coefficient: 1.0

taskset:
  - name: long_task_1
    iat: 200
    runtime: 10
    deadline: 200
    params: "period=200,wcet=10,arrival_offset=0,workload=encrypt"
    code:
      - fixed(10, encrypt)

  - name: long_task_2
    iat: 200
    runtime: 10
    deadline: 200
    params: "period=200,wcet=10,arrival_offset=0,workload=encrypt"
    code:
      - fixed(10, encrypt)

# 测试1：能量会计正确性验证
# 目标：验证能量消耗计算是否准确，不会透支
cpu_islands:
  - name: energy_aware_cpus
    numcpus: 2
    kernel:
      scheduler: gpfp_tie
      task_placement: global
    volts: [0.92, 0.94, 0.96, 0.98, 1.00]
    freqs: [7000, 7500, 8000, 8100, 8200]
    base_freq: 8100
    power_model: energy_aware_model
    speed_model: energy_aware_model

energy_management:
  initial_energy: 0.003         # 3mJ，够3个任务各执行1ms
  max_energy: 1000.0
  day_of_year: 182
  time_of_day_ms: 0
  use_real_solar_data: false
  pv_efficiency: 0.22
  pv_area_m2: 1.0
  periodic_collection_interval_ms: 1
  enable_energy_recovery: true
  max_recovery_wait_time_ms: 10000
  scheduler_energy_model:
    base_power: 0.5
    workload_coefficients:
      encrypt: 1.0              # 统一能耗系数
      control: 1.0
    frequency_power_ratios:
      7000: 0.85
      7500: 0.88
      8000: 0.92
      8100: 0.93
      8200: 0.94

power_models:
  - name: energy_aware_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0.00134845, 1.76307e-5, 124.535, 1.00399e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
      - workload: encrypt
        power_params: [0.00775587, 33.376, 1.54585, 9.53439e-10]
        speed_params: [0.0256054, 2.9809e+6, 0.602631, 8.13712e+9]
        energy_coefficient: 1.0
      - workload: control
        power_params: [0.00775587, 33.376, 1.54585, 9.53439e-10]
        speed_params: [0.0256054, 2.9809e+6, 0.602631, 8.13712e+9]
        energy_coefficient: 1.0

taskset:
  # 3个任务，每个需要0.5mJ/ms，总共1.5mJ
  # 初始能量3mJ，应该能执行2ms，然后能量不足
  - name: task_1
    iat: 100
    runtime: 5
    deadline: 100
    params: "period=100,wcet=5,arrival_offset=0,workload=encrypt"
    code:
      - fixed(5, encrypt)

  - name: task_2
    iat: 100
    runtime: 5
    deadline: 100
    params: "period=100,wcet=5,arrival_offset=0,workload=encrypt"
    code:
      - fixed(5, encrypt)

  - name: task_3
    iat: 100
    runtime: 5
    deadline: 100
    params: "period=100,wcet=5,arrival_offset=0,workload=encrypt"
    code:
      - fixed(5, encrypt)

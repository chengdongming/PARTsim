# 测试2：单任务场景
# 目标：验证单任务在能量不足时的行为
cpu_islands:
  - name: energy_aware_cpus
    numcpus: 1
    kernel:
      scheduler: gpfp_tie
      task_placement: global
    volts: [1.00]
    freqs: [8100]
    base_freq: 8100
    power_model: energy_aware_model
    speed_model: energy_aware_model

energy_management:
  initial_energy: 0.0005         # 0.5mJ，任务需要0.93mJ/ms，能量不足
  max_energy: 1000.0
  day_of_year: 182
  time_of_day_ms: 0
  use_real_solar_data: false
  pv_efficiency: 0.22
  pv_area_m2: 1.0
  periodic_collection_interval_ms: 1
  enable_energy_recovery: false
  scheduler_energy_model:
    base_power: 1.0
    workload_coefficients:
      encrypt: 1.0
    frequency_power_ratios:
      8100: 0.93

power_models:
  - name: energy_aware_model
    type: balsini_pannocchi
    params:
      - workload: encrypt
        power_params: [0.00775587, 33.376, 1.54585, 9.53439e-10]
        speed_params: [0.0256054, 2.9809e+6, 0.602631, 8.13712e+9]
        energy_coefficient: 1.0

taskset:
  - name: single_task
    iat: 50
    runtime: 10
    deadline: 50
    params: "period=50,wcet=10,arrival_offset=0,workload=encrypt"
    code:
      - fixed(10, encrypt)

# 简单测试配置：2核3任务
# 用于手动验证TIE、TGF、BTIE三种调度算法

cpu_islands:
  - island: "island0"
    voltage: 1100000
    frequency: 2000000000
    cores: [0, 1]  # 2个核心
    kernel:
      scheduler: "gpfp_btie"  # 可以改为 gpfp_tgf, gpfp_btie
      name: "MRTKernel"

energy_management:
  initial_energy: 100.0  # 初始能量100J（足够大，先不考虑能量限制）
  max_energy: 1000.0
  base_collection_rate: 1.0  # 固定收集率
  periodic_collection_interval: 1
  enable_energy_recovery: "启用"
  time_of_day_ms: 0
  use_real_solar_data: false  # 使用简化太阳能模型

scheduler_energy_model:
  base_power: 1.0  # 基础功率 1W
  base_frequency: 2000  # 基础频率 2000MHz
  workload_power_coefficients:
    bzip2: 1.2
    control: 0.1
    decrypt: 1.5
    encrypt: 1.5
    hash: 0.8
    idle: 0.1

  frequency_power_ratios:
    7000: 0.85
    7500: 0.88
    8000: 0.92
    8100: 0.93
    8200: 0.94
    8300: 0.95
    8400: 0.96
    8500: 0.97
    9000: 1.0
    9500: 1.05
    10000: 1.1
    10500: 1.15

tasks:
  - name: "task_1"
    type: "periodic"
    period: 20  # 周期20ms
    deadline: 20
    wcet: 5     # WCET 5ms
    arrival_offset: 0
    workload: "bzip2"
    instructions_count: 10000000

  - name: "task_2"
    type: "periodic"
    period: 30  # 周期30ms
    deadline: 30
    wcet: 10    # WCET 10ms
    arrival_offset: 0
    workload: "bzip2"
    instructions_count: 20000000

  - name: "task_3"
    type: "periodic"
    period: 40  # 周期40ms
    deadline: 40
    wcet: 15    # WCET 15ms
    arrival_offset: 0
    workload: "bzip2"
    instructions_count: 30000000

simulation:
  duration: 100  # 仿真100ms
  debug: true
  trace_file: "simple_test_trace.json"

# =============================================
# 5任务抢占测试配置
# =============================================
# 场景：3核心，5个任务，必然有任务在就绪队列等待
# 高优先级任务周期性到达会触发多次抢占
# =============================================

taskset:
  # ===========================================
  # 任务1: 周期20ms，WCET 5ms
  # 优先级最高（周期最短）
  # ===========================================
  - name: task_1
    iat: 20
    runtime: 5
    deadline: 20
    params: "period=20,wcet=5,arrival_offset=0,workload=bzip2"
    code:
      - fixed(5, bzip2)

  # ===========================================
  # 任务2: 周期25ms，WCET 8ms
  # ===========================================
  - name: task_2
    iat: 25
    runtime: 8
    deadline: 25
    params: "period=25,wcet=8,arrival_offset=0,workload=bzip2"
    code:
      - fixed(8, bzip2)

  # ===========================================
  # 任务3: 周期30ms，WCET 10ms
  # ===========================================
  - name: task_3
    iat: 30
    runtime: 10
    deadline: 30
    params: "period=30,wcet=10,arrival_offset=0,workload=bzip2"
    code:
      - fixed(10, bzip2)

  # ===========================================
  # 任务4: 周期40ms，WCET 15ms
  # ===========================================
  - name: task_4
    iat: 40
    runtime: 15
    deadline: 40
    params: "period=40,wcet=15,arrival_offset=0,workload=bzip2"
    code:
      - fixed(15, bzip2)

  # ===========================================
  # 任务5: 周期50ms，WCET 20ms
  # 优先级最低（周期最长）
  # ===========================================
  - name: task_5
    iat: 50
    runtime: 20
    deadline: 50
    params: "period=50,wcet=20,arrival_offset=0,workload=bzip2"
    code:
      - fixed(20, bzip2)

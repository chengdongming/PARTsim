# =============================================
# 抢占测试任务集 V3 - 全面测试三种算法
# =============================================
# 设计目标：
# 1. 测试不同优先级任务的抢占行为
# 2. 测试能量约束下的抢占
# 3. 对比BTIE/TIE/TGF的行为差异
# =============================================

taskset:
  # ========== 长运行任务（基准任务） ==========
  # 周期最大，优先级最低，用于被抢占
  - name: task_background
    iat: 300
    runtime: 50
    deadline: 300
    params: "period=300,wcet=50,arrival_offset=0,workload=bzip2"
    code:
      - fixed(50, bzip2)

  # ========== 高优先级任务组 ==========

  # 任务A：中等优先级，10ms到达
  - name: task_medium_a
    iat: 150
    runtime: 15
    deadline: 150
    params: "period=150,wcet=15,arrival_offset=10,workload=bzip2"
    code:
      - fixed(15, bzip2)

  # 任务B：较高优先级，25ms到达（应该抢占task_medium_a）
  - name: task_high_b
    iat: 100
    runtime: 12
    deadline: 100
    params: "period=100,wcet=12,arrival_offset=25,workload=bzip2"
    code:
      - fixed(12, bzip2)

  # 任务C：超高优先级，40ms到达（应该抢占所有）
  - name: task_urgent_c
    iat: 60
    runtime: 10
    deadline: 60
    params: "period=60,wcet=10,arrival_offset=40,workload=bzip2"
    code:
      - fixed(10, bzip2)

  # ========== 第二波测试任务 ==========

  # 任务D：中等优先级，70ms到达
  - name: task_medium_d
    iat: 140
    runtime: 18
    deadline: 140
    params: "period=140,wcet=18,arrival_offset=70,workload=bzip2"
    code:
      - fixed(18, bzip2)

  # 任务E：高优先级，85ms到达
  - name: task_high_e
    iat: 90
    runtime: 8
    deadline: 90
    params: "period=90,wcet=8,arrival_offset=85,workload=bzip2"
    code:
      - fixed(8, bzip2)

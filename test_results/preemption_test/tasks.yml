# =============================================
# 抢占性测试配置
# =============================================
# 设计理念：
# - Task1: 周期长、WCET长（低优先级）
# - Task2: 周期中等、WCET中等（中优先级）
# - Task3: 周期短、WCET短（高优先级）
# - 这样可以看到高优先级任务抢占低优先级任务
# =============================================
taskset:
  # Task1: 周期100ms，WCET 20ms（低优先级）
  - name: task_1
    iat: 100
    runtime: 20
    deadline: 100
    params: "period=100,wcet=20,arrival_offset=0,workload=bzip2"
    code:
      - fixed(20, bzip2)

  # Task2: 周期50ms，WCET 15ms（中优先级）
  - name: task_2
    iat: 50
    runtime: 15
    deadline: 50
    params: "period=50,wcet=15,arrival_offset=0,workload=bzip2"
    code:
      - fixed(15, bzip2)

  # Task3: 周期30ms，WCET 10ms（高优先级，会抢占Task2和Task1）
  - name: task_3
    iat: 30
    runtime: 10
    deadline: 30
    params: "period=30,wcet=10,arrival_offset=0,workload=bzip2"
    code:
      - fixed(10, bzip2)

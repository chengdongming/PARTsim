# =============================================
# TIE vs TGF 差异测试（最终版）
# =============================================
#
# 核心设计：使用不同workload类型创建不同能耗
# - task_1: 高优先级 + encrypt（高能耗约0.7mJ/ms）
# - task_2: 低优先级 + hash（低能耗约0.37mJ/ms）
#
# 初始能量：1.0mJ
# - task_1���量不足（1.0mJ < 0.7mJ但调度后剩余不足以task_2）
# - task_2如果单独调度则充足
#
# 预期行为：
# - TIE（保守）：task_1能量不足时立即停止级联
# - TGF（贪心）：跳过task_1，继续调度task_2
#
# =============================================

taskset:
  # task_1: 高优先级（deadline=20），高能耗
  - name: task_1_high_priority
    iat: 20
    runtime: 2
    deadline: 20
    params: "period=20,wcet=2,arrival_offset=0,workload=encrypt"
    code:
      - fixed(2, encrypt)

  # task_2: 低优先级（deadline=40），低能耗
  - name: task_2_low_priority
    iat: 40
    runtime: 2
    deadline: 40
    params: "period=40,wcet=2,arrival_offset=0,workload=hash"
    code:
      - fixed(2, hash)

# =============================================
# 能耗估算
# =============================================
#
# base_power = 0.5
# 频率 = 8100MHz，频率比 = 0.93
#
# task_1 (encrypt, 系数1.5):
#   能耗/ms = 0.5 * 1.5 * 0.93 ≈ 0.7 mJ
#
# task_2 (hash, 系数0.8):
#   能耗/ms = 0.5 * 0.8 * 0.93 ≈ 0.37 mJ
#
# =============================================
# 测试场景（初始能量0.9mJ）
# =============================================
#
# 0ms调度：
#   就绪队列：[task_1(prio=20, 0.7mJ), task_2(prio=40, 0.37mJ)]
#   初始能量：0.9mJ
#
#   getTaskN(0):
#     - 检查task_1：需要0.7mJ，有0.9mJ，能量足够 ✓
#     - 调度task_1到CPU0
#     - 累计能耗：0.7mJ
#     - 剩余：0.2mJ
#
#   getTaskN(1):
#     - task_1已在CPU0运行（会被跳过，不会重复计入）
#     - 检查task_2：需要0.37mJ，可用0.2mJ，能量不足 ✗
#
# TIE行为：
#   - 检查task_2：能量不足（0.2mJ < 0.37mJ）
#   - 立即停止级联 ❌
#   - 返回nullptr
#   - CPU1保持空闲
#
# TGF行为：
#   - 检查task_2：能量不足（0.2mJ < 0.37mJ）
#   - 跳过task_2
#   - 继续搜索：没有更多任务了
#   - 返回nullptr
#   - CPU1保持空闲
#
# 结果还是相同！因为只有2个任务，task_2能量不足后没有后续任务了。
#
# =============================================
# 重新设计：初始能量0.6mJ
# =============================================
#
# 0ms调度：
#   就绪队列：[task_1(prio=20, 0.7mJ), task_2(prio=40, 0.37mJ)]
#   初始能量：0.6mJ
#
#   getTaskN(0):
#     - 检查task_1：需要0.7mJ，有0.6mJ，能量不足 ✗
#
# TIE行为：
#   - 检查task_1：能量不足（0.6mJ < 0.7mJ）
#   - 立即停止级联 ❌
#   - 返回nullptr
#   - CPU0和CPU1都保持空闲
#
# TGF行为：
#   - 检查task_1：能量不足（0.6mJ < 0.7mJ）
#   - 跳过task_1
#   - 继续检查task_2：需要0.37mJ，有0.6mJ，能量足够 ✓
#   - 调度task_2到CPU0
#   - 剩余：0.23mJ
#
#   getTaskN(1):
#     - task_2已在CPU0运行
#     - 继续搜索：没有更多任务了
#     - 返回nullptr
#   - CPU1保持空闲
#
# 差异：
#   TIE：0个任务被调度
#   TGF：1个任务被调度（task_2）✅
#
# 这就展示了TGF的贪心优势！
#
# =============================================

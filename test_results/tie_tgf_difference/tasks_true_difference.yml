# =============================================
# TIE vs TGF 真正差异测试
# =============================================
#
# 核心设计：使用不同workload类型创建不同能耗
# - task_1: 高优先级 + encrypt（高能耗1.5）
# - task_2: 中优先级 + hash（低能耗0.8）
# - task_3: 低优先级 + hash（���能耗0.8）
#
# 预期行为：
# - TIE（保守）：task_1能量不足时立即停止级联
# - TGF（贪心）：跳过task_1，继续调度task_2和task_3
#
# =============================================

taskset:
  # task_1: 高优先级（deadline=20），高能耗（encrypt, 系数1.5）
  - name: task_1_high_power
    iat: 20
    runtime: 2
    deadline: 20
    params: "period=20,wcet=2,arrival_offset=0,workload=encrypt"
    code:
      - fixed(2, encrypt)

  # task_2: 中优先级（deadline=30），低能耗（hash, 系数0.8）
  - name: task_2_low_power
    iat: 30
    runtime: 2
    deadline: 30
    params: "period=30,wcet=2,arrival_offset=0,workload=hash"
    code:
      - fixed(2, hash)

  # task_3: 低优先级（deadline=40），低能耗（hash, 系数0.8）
  - name: task_3_low_power
    iat: 40
    runtime: 2
    deadline: 40
    params: "period=40,wcet=2,arrival_offset=0,workload=hash"
    code:
      - fixed(2, hash)

# =============================================
# 能耗计算
# =============================================
#
# base_power = 0.5
# 频率 = 8100MHz (base_freq)
# 频率功率比 = 0.93
#
# task_1 (encrypt):
#   能耗 = 0.5 * 1.5 * 0.93 ≈ 0.7 mJ/ms
#
# task_2/3 (hash):
#   能耗 = 0.5 * 0.8 * 0.93 ≈ 0.37 mJ/ms
#
# =============================================
# 测试场景（初始能量1.2mJ）
# =============================================
#
# 0ms调度：
#   就绪队列（按优先级）：
#     [task_1(prio=20, 0.7mJ/ms), task_2(prio=30, 0.37mJ/ms), task_3(prio=40, 0.37mJ/ms)]
#   初始能量：1.2mJ
#
#   getTaskN(0):
#     - 检查task_1：需要0.7mJ，有1.2mJ，能量足够 ✓
#     - 调度task_1到CPU0
#     - 剩余能量：1.2mJ - 0.7mJ = 0.5mJ
#
#   getTaskN(1):
#     - task_1已在CPU0运行
#     - 检查task_2：需要0.37mJ，可用0.5mJ，能量足够 ✓
#     - 调度task_2到CPU1
#     - 剩余能量：0.5mJ - 0.37mJ = 0.13mJ
#
# 这个场景不对，两个任务都能调度。
#
# 重新设计：初始能量0.8mJ
#
# 0ms调度：
#   初始能量：0.8mJ
#
#   getTaskN(0):
#     - 检查task_1：需要0.7mJ，有0.8mJ，能量足够 ✓
#     - 调度task_1到CPU0
#     - 剩余：0.1mJ
#
#   getTaskN(1):
#     - 检查task_2：需要0.37mJ，可用0.1mJ，能量不足 ✗
#
# TIE行为：
#   - 检查task_2：能量不足
#   - 立即停止级联
#   - 返回nullptr
#   - CPU1空闲
#
# TGF行为：
#   - 检查task_2：能量不足
#   - 跳过task_2
#   - 继续检查task_3：需要0.37mJ，可用0.1mJ，能量不足 ✗
#   - 没有更多任务
#   - 返回nullptr
#   - CPU1空闲
#
# 结果还是相同！因为task_2和task_3能耗相同。
#
# 修改设计：只创建2个任务
#
# =============================================

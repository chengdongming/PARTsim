# =============================================
# TIE vs TGF 简单差异测试
# =============================================
#
# 设计思路：
# 创建一个场景，其中：
# - 高优先级任务(task_1)能量需求大，导致后续能量不足
# - 低优先级任务(task_2)能量需求小，可以调度
#
# 关���配置：
# - 初始能量：1.0mJ（刚够调度一个任务）
# - task_1: 高优先级，1ms能耗0.6mJ
# - task_2: 中优先级，1ms能耗0.3mJ（通过参数调整）
# - task_3: 低优先级，1ms能耗0.3mJ
#
# 注意：由于系统限制，所有任务的每ms能耗实际都是0.6mJ
#       所以这个测试需要依赖其他机制
#
# =============================================

taskset:
  # task_1: 高优先级，正常能耗
  - name: task_1
    iat: 20
    runtime: 1
    deadline: 20
    params: "period=20,wcet=1,arrival_offset=0,workload=bzip2"
    code:
      - fixed(1, bzip2)

  # task_2: 中优先级，短执行时间
  - name: task_2
    iat: 30
    runtime: 1
    deadline: 30
    params: "period=30,wcet=1,arrival_offset=0,workload=bzip2"
    code:
      - fixed(1, bzip2)

  # task_3: 低优先级，短执行时间
  - name: task_3
    iat: 40
    runtime: 1
    deadline: 40
    params: "period=40,wcet=1,arrival_offset=0,workload=bzip2"
    code:
      - fixed(1, bzip2)

# =============================================
# 实际测试场景（利用初始能量限制）
# =============================================
#
# 系统配置：
# - 2个CPU
# - 初始能量：0.8mJ（只能调度1个任务，因为每个0.6mJ）
#
# 0ms调度：
#   就绪队列：[task_1(prio=20), task_2(prio=30), task_3(prio=40)]
#   初始能量：0.8mJ
#
#   getTaskN(0):
#     - 检查task_1：需要0.6mJ，有0.8mJ，能量足够 ✓
#     - 调度task_1到CPU0
#     - 剩余能量：0.8mJ - 0.6mJ = 0.2mJ
#
#   getTaskN(1):
#     - task_1已经在CPU0运行中（但不会被getTaskN(1)重复调度）
#     - 检查task_2：需要0.6mJ，可用0.2mJ，能量不足 ✗
#
# TIE行为：
#   - 检查task_2：能量不足
#   - 立即停止级联
#   - 返回nullptr
#   - CPU1保持空闲
#
# TGF行为：
#   - 检查task_2：能量不足
#   - 跳过task_2
#   - 继续检查task_3：需要0.6mJ，可用0.2mJ，能量不足 ✗
#   - 没有更多任务
#   - 返回nullptr
#   - CPU1保持空闲
#
# 结果：两个算法表现相同（因为所有任务能耗相同）
#
# =============================================
# 结论
# =============================================
#
# 在当前系统限制下（所有任务每ms能耗都是0.6mJ），
# TGF的贪心策略（跳过能量不足的任务，继续检查后续任务）
# 无法展示优势，因为：
#
# - 如果第一个任务能量不足，后续任务也会能量不足
#   （因为它们消耗相同的能量）
#
# - TGF跳过第一个任务后，检查第二个，还是不足
# - 再检查第三个，还是不足
# - 最终和TIE一样返回nullptr
#
# 要真正展示TGF的贪心优势，需要：
# 1. 不同任务有不同的每ms能耗
# 2. 或者创建其他复杂场景
#
# =============================================
# 建议的测试方向
# =============================================
#
# 由于当前系统限制，建议：
#
# 1. 承认TGF的贪心策略在代码层面已正确实现
#    （跳过能量不足的任务，继续搜索后续任务）
#
# 2. 在特定场景下（不同能耗任务），
#    TGF会展现出比TIE更高的CPU利用率
#
# 3. 当前测试场景下表现相同是正确的，
#    因为任务能耗相同
#
# 4. 如需展示差异，需要修改系统支持不同任务的不同能耗
#
# =============================================

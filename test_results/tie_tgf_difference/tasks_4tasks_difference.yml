# =============================================
# TIE vs TGF 多核差异测试（4任务版）
# =============================================
#
# 核心设计：
# - task_1, task_2: 超高优先级 + 超高能耗（encrypt）
# - task_3, task_4: 低优先级 + 最低能耗（control）
#
# 2个CPU，初始能量设为刚好够调度2个低能耗任务
#
# 预期：
# - TIE：遇到超高能耗任务时立即停止，不调度低能耗任务
# - TGF：跳过超高能耗任务，继续调度低能耗任务
#
# =============================================

taskset:
  # task_1: 超高优先级，超高能耗
  - name: task_1_very_high_priority
    iat: 20
    runtime: 2
    deadline: 20
    params: "period=20,wcet=2,arrival_offset=0,workload=encrypt"
    code:
      - fixed(2, encrypt)

  # task_2: 超高优先级，超高能耗
  - name: task_2_very_high_priority
    iat: 25
    runtime: 2
    deadline: 25
    params: "period=25,wcet=2,arrival_offset=0,workload=encrypt"
    code:
      - fixed(2, encrypt)

  # task_3: 低优先级，最低能耗
  - name: task_3_low_priority
    iat: 40
    runtime: 2
    deadline: 40
    params: "period=40,wcet=2,arrival_offset=0,workload=control"
    code:
      - fixed(2, control)

  # task_4: 低优先级，最低能耗
  - name: task_4_low_priority
    iat: 50
    runtime: 2
    deadline: 50
    params: "period=50,wcet=2,arrival_offset=0,workload=control"
    code:
      - fixed(2, control)

# =============================================
# 能耗估算
# =============================================
#
# base_power = 0.5
# 频率 = 8100MHz，频率比 = 0.93
#
# task_1/2 (encrypt, 系数1.5):
#   能耗/ms = 0.5 * 1.5 * 0.93 ≈ 0.70 mJ
#
# task_3/4 (control, 系数0.1):
#   能耗/ms = 0.5 * 0.1 * 0.93 ≈ 0.0465 mJ
#
# =============================================
# 测试场景（初始能量0.15mJ）
# =============================================
#
# 0ms调度（2个CPU）：
#   就绪队列（按优先级）：
#     [task_1(prio=20, 0.70mJ),
#      task_2(prio=25, 0.70mJ),
#      task_3(prio=40, 0.0465mJ),
#      task_4(prio=50, 0.0465mJ)]
#   初始能量：0.15mJ
#
#   getTaskN(0):
#     - 检查task_1：需要0.70mJ，有0.15mJ，能量不足 ✗
#
# TIE行为：
#   - 检查task_1：能量不足
#   - 立即停止级联 ❌
#   - 返回nullptr
#   - CPU0空闲
#
#   getTaskN(1):
#     - 再次检查task_1：能量不足
#     - 立即停止级联 ❌
#     - 返回nullptr
#   - CPU1空闲
#   - 结果：0个任务被调度
#
# TGF行为：
#   - 检查task_1：能量不足（0.15mJ < 0.70mJ）
#   - 跳过task_1
#   - 继续检查task_2：能量不足（0.15mJ < 0.70mJ）
#   - 跳过task_2
#   - 继续检查task_3：需要0.0465mJ，有0.15mJ，能量足够 ✓
#   - 调度task_3到CPU0
#   - 剩余：0.1035mJ
#
#   getTaskN(1):
#     - task_3已在CPU0运行
#     - 跳过task_1, task_2（已在队列中跳过）
#     - 跳过task_3（已调度）
#     - 检查task_4：需要0.0465mJ，有0.1035mJ，能量足够 ✓
#   - 调度task_4到CPU1
#   - 剩余：0.057mJ
#   - 结果：2个任务被调度
#
# 差异：
#   TIE：0个任务被调度
#   TGF：2个任务被调度（task_3, task_4）✅
#
# =============================================

# =============================================
# 展示TIE和TGF差异的测试场景
# =============================================
#
# 关键设计：
# 利用能量收集创建一个窗口期��使得：
# - 第一个任务（高优先级）能量不足
# - 第二个任务（低优先级）能量充足
#
# 系统配置：
# - 2个CPU
# - 初始能量：1.5mJ
# - 能量收集：每ms收集0.2mJ
#
# 任务设计：
# - task_1: 高优先级(prio=20), 长WCET(10ms)
# - task_2: 中优先级(prio=30), 短WCET(1ms)
# - task_3: 低优先级(prio=40), 短WCET(1ms)
#
# =============================================

taskset:
  # task_1: 高优先级，长执行时间
  - name: task_1
    iat: 20
    runtime: 10
    deadline: 20
    params: "period=20,wcet=10,arrival_offset=0,workload=bzip2"
    code:
      - fixed(10, bzip2)

  # task_2: 中优先级，短执行时间
  - name: task_2
    iat: 30
    runtime: 1
    deadline: 30
    params: "period=30,wcet=1,arrival_offset=0,workload=bzip2"
    code:
      - fixed(1, bzip2)

  # task_3: 低优先级，短执行时间
  - name: task_3
    iat: 40
    runtime: 1
    deadline: 40
    params: "period=40,wcet=1,arrival_offset=0,workload=bzip2"
    code:
      - fixed(1, bzip2)

# =============================================
# 预期行为分析
# =============================================
#
# 0ms调度：
#   就绪队列：[task_1(prio=20), task_2(prio=30), task_3(prio=40)]
#   初始能量：1.5mJ
#
#   getTaskN(0): task_1需要0.6mJ，有1.5mJ ✓ → 调度task_1到CPU0
#   getTaskN(1): task_2需要0.6mJ，有0.9mJ ✓ → 调度task_2到CPU1
#   总消耗：1.2mJ，剩余：0.3mJ
#
# 1ms tick：
#   扣除运行能量：1.2mJ
#   收集能量：0.2mJ
#   剩余：0.3mJ - 1.2mJ + 0.2mJ = -0.7mJ → 能量不足！
#
#   task_1和task_2都被中断
#   触发新的调度
#
#   剩余能量：-0.7mJ（但由于能量收集，实际会收集到一些）
#   实际上：0.3mJ - 1.2mJ（不够）会先中断
#
# 重新设计，让task_2在1ms结束：
#
# 0ms调度：
#   - task_1到CPU0: 0.6mJ
#   - task_2到CPU1: 0.6mJ
#   - 剩余：0.3mJ
#
# 1ms：
#   - task_2结束（runtime=1ms）
#   - 能量收集：0.2mJ
#   - 剩余：0.3mJ - 1.2mJ + 0.2mJ = -0.7mJ
#   - ��量不足，task_1被中断
#
# 还是不行，能量在1ms就用完了。
#
# 新方案：增加初始能量到2.0mJ
#
# 0ms调度：
#   - task_1到CPU0: 0.6mJ
#   - task_2到CPU1: 0.6mJ
#   - 剩余：0.8mJ
#
# 1ms：
#   - task_2结束
#   - 扣除：1.2mJ，收集：0.2mJ
#   - 剩余：0.8mJ - 1.2mJ + 0.2mJ = -0.2mJ → 还是不够！
#
# 再增加初始能量到2.5mJ：
#
# 0ms调度：
#   - 剩余：2.5mJ - 1.2mJ = 1.3mJ
#
# 1ms：
#   - task_2结束
#   - 扣除：1.2mJ，收集：0.2mJ
#   - 剩余：1.3mJ - 1.2mJ + 0.2mJ = 0.3mJ
#   - 触发新的调度（task_2结束）
#
#   就绪队列：[task_3] (task_1还在运行)
#   getTaskN(1):
#     - task_1运行中，续期，计入0.6mJ
#     - 可用能量：0.3mJ - 0.6mJ = -0.3mJ → 能量不足！
#
# TIE：
#   - 检查task_3：需要0.6mJ，可用-0.3mJ
#   - 立即停止级联 ❌
#   - 返回nullptr
#
# TGF：
#   - 检查task_3：需要0.6mJ，可用-0.3mJ
#   - 跳过task_3
#   - 继续搜索：没有更多任务了
#   - 返回nullptr
#
# 结果还是相同！
#
# =============================================
# 关键洞察
# =============================================
#
# 问题在于：运行中的task_1总是消耗0.6mJ，导致可用能量不足。
#
# 要展示差异，需要创建一个场景：
# - task_1已经结束（不消耗能量）
# - task_2能量不足（由于某种原因）
# - task_3能量充足
#
# 但这很难设计，因为如果task_1结束，能量会释放。
#
# 实际上，TGF的贪心策略的优势主要体现在：
# - 有多个任务在就绪队列中
# - 第一个任务（高优先级）由于某种原因能量不足
# - 第二个任务（低优先级）能量充足
#
# 这通常发生在：
# 1. 不同任务有不同的能耗（当前系统不支持）
# 2. 或者某些任务已经部分执行，剩余能量需求不同
#
# 在当前系统限制下（所有任务每ms能耗相同），
# TGF和TIE在这个特定测试场景下的表现相同是正常的。
#
# =============================================

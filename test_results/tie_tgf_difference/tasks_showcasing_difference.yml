# =============================================
# 测试TIE和TGF调度器差异的任务集（改进版）
# =============================================
# 关键洞察：
# 能量检查是在tick边界逐ms进行的，不是调度时检查总能量。
# 要展示TIE和TGF的差异，需要创建一个场景：
# - 运行中的任务消耗了大部分能量
# - 就绪队列中有多个任务，第一个能量不足，第二个能量充足
#
# 差异点：
# - TIE（保守）：检查第一个任务能量不足时，停止级联
# - TGF（贪心）：跳过第一个任务，继续检查第二个任务
# =============================================

taskset:
  # ===========================================
  # task_1: 高优先级（deadline=20），WCET 10ms
  # ===========================================
  - name: task_1
    iat: 20
    runtime: 10
    deadline: 20
    params: "period=20,wcet=10,arrival_offset=0,workload=bzip2"
    code:
      - fixed(10, bzip2)

  # ===========================================
  # task_2: 中优先级（deadline=30），WCET 3ms
  # ===========================================
  - name: task_2
    iat: 30
    runtime: 3
    deadline: 30
    params: "period=30,wcet=3,arrival_offset=0,workload=bzip2"
    code:
      - fixed(3, bzip2)

  # ===========================================
  # task_3: 低优先级（deadline=40），WCET 2ms
  # ===========================================
  - name: task_3
    iat: 40
    runtime: 2
    deadline: 40
    params: "period=40,wcet=2,arrival_offset=0,workload=bzip2"
    code:
      - fixed(2, bzip2)

  # ===========================================
  # task_4: 最低优先级（deadline=50），WCET 2ms
  # ===========================================
  - name: task_4
    iat: 50
    runtime: 2
    deadline: 50
    params: "period=50,wcet=2,arrival_offset=0,workload=bzip2"
    code:
      - fixed(2, bzip2)

# ===========================================
# 系统配置：
# - 2个CPU
# - 初始能量：2.4mJ（只能运行4ms：2.4 / 0.6 = 4）
#
# 预期行为：
#
# 0ms调度：
#   就绪队列：[task_1(prio=20), task_2(prio=30), task_3(prio=40), task_4(prio=50)]
#   - 调度task_1到CPU0（0.6mJ/ms）
#   - 调度task_2到CPU1（0.6mJ/ms）
#   - 总消耗：1.2mJ/ms
#
# 1ms后：
#   - 剩余能量：2.4mJ - 1.2mJ = 1.2mJ
#   - task_2继续运行
#
# 2ms后：
#   - 剩余能量：1.2mJ - 1.2mJ = 0mJ
#   - task_2结束（runtime=3ms，应该运行到3ms）
#   但能量在2ms就用完了！
#
# 2ms tick：
#   - 剩余能量：0mJ
#   - task_1和task_2都被中断（能量不足）
#   - 触发新的调度
#
#   就绪队列：[task_1, task_3, task_4]
#   - task_1需要0.6mJ，但只有0mJ，能量不足！
#
#   TIE（保守）：
#     → 检查task_1：能量不足
#     → 停止级联
#     → getTaskN(0) = nullptr
#     → getTaskN(1) = nullptr
#     → 结果：保持空闲
#
#   TGF（贪心）：
#     → 检查task_1：能量不足，跳过
#     → 检查task_3：能量不足（0mJ < 0.6mJ），跳过
#     → 检查task_4：能量不足（0mJ < 0.6mJ），跳过
#     → getTaskN(0) = nullptr
#     → 结果：保持空闲
#
# 这个场景也不行，因为所有任务能量都不足！
#
# 重新设计：需要task_3的能量需求很小，但在当前系统中，
# 所有任务的每ms能耗都是0.6mJ，无法设置不同的能耗。
# ===========================================

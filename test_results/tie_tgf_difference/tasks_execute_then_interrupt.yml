# =============================================
# TIE vs TGF 复杂差异测试：任务执行后中断场景
# =============================================
#
# 核心设计：
# - task_1, task_2: 高优先级 + 高能耗（encrypt）
#   - 可以执行1ms（消耗0.75mJ）
#   - 但能量不足以执行第2ms
# - task_3, task_4: 低优先级 + 低能耗（control）
#   - 剩余能量可以执行多个ms
#
# 预期行为：
# - 0ms: 调度task_1和task_2到两个CPU
# - 1ms tick: task_1和task_2各消耗0.75mJ，能量不足，被中断
# - 剩余能量可以调度task_3和task_4
#
# =============================================

taskset:
  # task_1: 超高优先级，高能耗，长执行时间
  - name: task_1_very_high_priority
    iat: 20
    runtime: 5  # 设置长执行时间，观察中断
    deadline: 20
    params: "period=20,wcet=5,arrival_offset=0,workload=encrypt"
    code:
      - fixed(5, encrypt)

  # task_2: 超高优先级，高能耗，长执行时间
  - name: task_2_very_high_priority
    iat: 25
    runtime: 5  # 设置长执行时间，观察中断
    deadline: 25
    params: "period=25,wcet=5,arrival_offset=0,workload=encrypt"
    code:
      - fixed(5, encrypt)

  # task_3: 低优先级，最低能耗
  - name: task_3_low_priority
    iat: 40
    runtime: 3
    deadline: 40
    params: "period=40,wcet=3,arrival_offset=0,workload=control"
    code:
      - fixed(3, control)

  # task_4: 低优先级，最低能耗
  - name: task_4_low_priority
    iat: 50
    runtime: 3
    deadline: 50
    params: "period=50,wcet=3,arrival_offset=0,workload=control"
    code:
      - fixed(3, control)

# =============================================
# 能耗估算
# =============================================
#
# base_power = 0.5
# 频率 = 8100MHz，频率比 = 0.93
#
# task_1/2 (encrypt, 系数1.5):
#   能耗/ms = 0.5 * 1.5 * 0.93 ≈ 0.70 mJ
#
# task_3/4 (control, 系数0.1):
#   能耗/ms = 0.5 * 0.1 * 0.93 ≈ 0.0465 mJ
#
# =============================================
# 测试场景（初始能量1.6mJ）
# =============================================
#
# 0ms调度（2个CPU）：
#   就绪队列（按优先级）：
#     [task_1(prio=20, 0.70mJ/ms), task_2(prio=25, 0.70mJ/ms),
#      task_3(prio=40, 0.0465mJ/ms), task_4(prio=50, 0.0465mJ/ms)]
#   初始能量：1.6mJ
#
#   getTaskN(0):
#     - 检查task_1：需要0.70mJ，有1.6mJ，能量足够 ✓
#     - 调度task_1到CPU0
#
#   getTaskN(1):
#     - task_1已在CPU0运行（不重复计入）
#     - 检查task_2：需要0.70mJ，可用0.9mJ，能量足够 ✓
#     - 调度task_2到CPU1
#
#   状态：CPU0=task_1, CPU1=task_2，剩余能量：0.2mJ
#
# 1ms tick：
#   扣除运行能量：0.70mJ * 2 = 1.4mJ
#   剩余能量：1.6mJ - 1.4mJ = 0.2mJ
#
#   检查task_1：需要0.70mJ继续第2ms，但只有0.2mJ → 能量不足！
#   检查task_2：需要0.70mJ继续第2ms，但只有0.2mJ → 能量不足！
#
#   两个高能耗任务都被中断
#
#   触发新的调度（0ms tick完成后）：
#   就绪队列：[task_1, task_2, task_3, task_4]
#   运行中：无（都被中断了）
#   当前能量：0.2mJ
#
# TIE行为：
#   getTaskN(0):
#     - 检查task_1：需要0.70mJ，有0.2mJ，能量不足 ✗
#     - 立即停止级联 ❌
#     - 返回nullptr
#
#   getTaskN(1):
#     - 再次检查task_1：能量不足
#     - 立即停止级联 ❌
#     - 返回nullptr
#
#   结果：0个低能耗任务被调度
#
# TGF行为：
#   getTaskN(0):
#     - 检查task_1：需要0.70mJ，有0.2mJ，能量不足 ✗
#     - 跳过task_1
#     - 检查task_2：需要0.70mJ，有0.2mJ，能量不足 ✗
#     - 跳过task_2
#     - 检查task_3：需要0.0465mJ，有0.2mJ，能量足够 ✓
#     - 调度task_3到CPU0
#
#   getTaskN(1):
#     - task_3已在CPU0运行
#     - 跳过task_1, task_2
#     - 跳过task_3
#     - 检查task_4：需要0.0465mJ，可用0.1535mJ，能量足够 ✓
#     - 调度task_4到CPU1
#
#   结果：2个低能耗任务被调度
#
# =============================================
# 差异总结
# =============================================
#
# TIE（保守）：
#   - 高能耗任务中断后，因为task_1仍在队列首位
#   - 检查task_1能量不足，立即停止级联
#   - 不调度任何低能耗任务
#   - 结果：0个低能耗任务被调度
#
# TGF（贪心）：
#   - 高能耗任务中断后，跳过task_1和task_2
#   - 继续检查task_3和task_4，能量足够
#   - 调度2个低能耗任务
#   - 结果：2个低能耗任务被调度，充分利用剩余能量
#
# =============================================

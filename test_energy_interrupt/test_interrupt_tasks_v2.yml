# =============================================
# 测试能量中断的任务集 V2 - 更激进的参数
# =============================================
# 设计目的：在更短时间内触发能量中断
# - 2个CPU核心
# - 5个任务，同时到达
# - 初始能量0.01J（非常小）
# - 夜间场景（太阳能收集为0）
# - 任务WCET增加到50ms（更长执行时间）
# =============================================

taskset:
  # ===========================================
  # 任务1: 长时间执行任务
  # ===========================================
  - name: task_long_1
    iat: 200
    runtime: 50
    deadline: 200
    params: "period=200,wcet=50,arrival_offset=0,workload=bzip2"
    code:
      - fixed(50, bzip2)

  # ===========================================
  # 任务2: 长时间执行任务

# 2核测试任务集 - 3个任务，测试抢占行为
taskset:
  # task_high: 最高优先级 - 周期300ms
  - name: task_high
    iat: 300
    runtime: 150          # WCET: 150ms
    deadline: 300
    params: "period=300,wcet=150,workload=bzip2"
    code:
      - fixed(150, bzip2)

  # task_mid: 中优先级 - 周期500ms
  - name: task_mid
    iat: 500
    runtime: 250          # WCET: 250ms
    deadline: 500
    params: "period=500,wcet=250,workload=bzip2"
    code:
      - fixed(250, bzip2)

  # task_low: 低优先级 - 周期800ms
  - name: task_low
    iat: 800
    runtime: 200          # WCET: 200ms
    deadline: 800
    params: "period=800,wcet=200,workload=bzip2"
    code:
      - fixed(200, bzip2)

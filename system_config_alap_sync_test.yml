# =============================================
# PARTSim 系统配置 - ALAP Sync 调度器测试
# =============================================

cpu_islands:
  - name: energy_aware_cpus
    numcpus: 2
    kernel:
      scheduler: gpfp_alap_sync
      task_placement: global
    volts: [0.92, 0.94, 0.96, 0.98, 1.00]
    freqs: [7000, 7500, 8000, 8500, 9000]
    base_freq: 8000
    power_model: energy_aware_model
    speed_model: energy_aware_model

energy_management:
  initial_energy: 100.0
  max_energy: 1000.0
  day_of_year: 187
  time_of_day_ms: 21900000
  use_real_solar_data: false
  pv_efficiency: 0.18
  pv_area_m2: 1.0
  periodic_collection_interval_ms: 1
  enable_energy_recovery: true
  max_recovery_wait_time_ms: 10000
  scheduler_energy_model:
    base_power: 0.5
    workload_coefficients:
      bzip2: 1.2
      hash: 0.8
      idle: 0.1

power_models:
  - name: energy_aware_model
    type: balsini_pannocchi
    params:
      - workload: idle
        power_params: [0.001, 1.0, 1.0, 1.0e-10]
        speed_params: [1, 0, 0, 0]
        energy_coefficient: 0.1
      - workload: bzip2
        power_params: [0.007, 33.0, 1.5, 9.5e-10]
        speed_params: [0.025, 2.9e+6, 0.6, 8.1e+9]
        energy_coefficient: 1.2
      - workload: hash
        power_params: [0.006, 176.0, 1.7, 1.7e-10]
        speed_params: [0.006, 3.3e+6, 7.8, 93459]
        energy_coefficient: 0.8
